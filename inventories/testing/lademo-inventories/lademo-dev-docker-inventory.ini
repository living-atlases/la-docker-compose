data_quality_filter_service_context_path = 
data_quality_filter_service_hostname = data-quality.l-a.site

data_quality_filter_service_uri_filter_pattern=/data-profiles,/filters/*,/download.*

# default_list_view =
data_quality_skin_layout = "{{ 'ala-main' if data_quality_filter_service_version is version('1.3.0', '>=') else 'ala' }}"
dwc_exclude=dataHubUid,dataProviderUid,institutionUid,year,month,day,modified,left,right,provenance,taxonID,preferredFlag,outlierForLayers,speciesGroups,associatedMedia,images,userQualityAssertion,speciesHabitats,duplicationType,taxonomicIssues,subspeciesID,nameMatchMetric,sounds,verbatimAssociatedMedia,datasetName,fieldNumber,samplingProtocol

dq_db_user=data-quality
dq_db_name=data-quality
dq_db_url=jdbc:postgresql://localhost/data-quality
dq_db_dialect=org.hibernate.dialect.PostgreSQLDialect
dq_db_driver=org.postgresql.Driver
# FIXME just testing ALA uses pg 13
data_quality_pg_version=10

use_openjdk8 = "{{ data_quality_filter_service_version is version('1.3.0', '<') }}"
use_openjdk11 = "{{ data_quality_filter_service_version is version('1.3.0', '>=') and data_quality_filter_service_version is version('3.0.0', '<') }}"
use_openjdk17 = "{{ data_quality_filter_service_version is version('3.0.0', '>=') }}"


[namematching-service:vars]
namematching_service_hostname = namematching.l-a.site
namematching_service_context_path= 

# Use default ala-namematching ports
# namematching_service_port = 8880
# namematching_admin_port = 8881

# In ALA:
# nameindex_to_use=ala
# nameindex_datestamp=20200214
# ala_nameindex_source_url=https://archives.ala.org.au/archives/nameindexes

namematching_user=namematching

# FIXME, how to set this without affect other services (as auth do)
# max_memory=512m
# min_memory=512m

use_openjdk8 = true
use_openjdk11 = false
use_openjdk17 = false


[sensitive-data-service:vars]
sensitive_data_service_hostname = sensitive-data-service.l-a.site
sensitive_data_service_context_path= 



####################### Docker Compose #########################################

[docker_compose:vars]
docker_compose_data_dir=/data/docker-compose
docker_registry=livingatlases

docker_data_dir=/var/lib/docker
# Size of the zookeeper/solrcloud cluster (for now a service on each docker cluster node)
zookeeper_hosts=1
solr_hosts=1

nginx_docker_internal_resolver=true

docker_solr_hosts = ["localhost"]

[docker_compose_hosts:vars]
deployment_type = container
# Database overrides for Docker Compose (using container names from la-docker-compose)
collectory_db_host_address = la_mysql
collectory_db_host = la_mysql
logger_db_hostname = la_mysql
specieslist_db_hostname = la_mysql
alerts_db_hostname = la_mysql
webapi_db_hostname = la_mysql
doi_db_hostname = la_mysql
cas_db_hostname = la_mysql
user_store_db_hostname = la_mysql
ticket_registry_db_hostname = la_mysql
apikey_db_hostname = la_mysql
# Mongodb overrides
cas_audit_host=la_mongodb
cas_spring_session_host=la_mongodb
cas_tickets_host=la_mongodb
cas_services_host=la_mongodb
# Spatial/Postgres overrides
postgresql_host = la_postgres
layers_db_host = la_postgres
geonetwork_host = la_postgres
spatial_db_host = la_postgres
# Additional service DB overrides
image_db_host = la_mysql
data_quality_db_host = la_mysql
# Container service hostnames
solr_host = la_solr
cassandra_host = la_cassandra
elasticsearch_host = la_elasticsearch
[gatus:vars]
gatus_path=/
gatus_url=gatus.l-a.site
use_gatus=true
[portainer:vars]
portainer_path=/
portainer_url=portainer.l-a.site
