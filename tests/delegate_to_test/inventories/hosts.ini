# Minimal test inventory for delegate_to pattern testing
# Emulates the lademo pattern where multiple service aliases point to same ansible_host
# but have different inventory contexts (groups and variables)

[all]
localhost.docker_compose ansible_host=localhost ansible_connection=local
localhost.cas ansible_host=localhost ansible_connection=local

# Physical docker-compose host (where playbook runs)
[docker_compose]
localhost.docker_compose

# CAS service group (has variables, but playbook doesn't run here directly)
[cas-servers]
localhost.cas

# CAS-specific variables - ONLY available to .cas alias context
[cas-servers:vars]
cas_server_name=https://test-cas.example.com
cas_host_name=test-cas.example.com
cas_context_path=cas
deployment_type=container
