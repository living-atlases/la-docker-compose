# Collision test inventory - 2 services with conflicting variable names/values

[all:vars]
deployment_type=container

[docker_compose]
test-host.docker_compose ansible_host=test-host ansible_connection=local

[docker_compose:vars]
docker_compose_data_dir=/data/docker-compose

[cas-servers]
test-host.cas ansible_host=test-host ansible_connection=local

[cas-servers:vars]
# CAS-specific values
userdetails_base_url=https://auth.test.site/userdetails
service_name=CAS
service_port=8080
config_dir=/data/cas/config

[collectory]
test-host.collectory ansible_host=test-host ansible_connection=local

[collectory:vars]
# Collectory-specific values (DIFFERENT from CAS!)
userdetails_base_url=https://collectory.test.site/userdetails
service_name=Collectory
service_port=8081
config_dir=/data/collectory/config
