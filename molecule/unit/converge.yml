---
# Unit tests for roles/la-compose/tasks/normalize-hostnames.yml
#
# Covers four test cases:
#   1. localhost/127.0.0.1 values → correct Docker container names
#   2. Idempotency: already-normalized values survive a second run unchanged
#   3. Development mail mode: mail_smtp_host → mailhog when docker_mail_development_mode=true
#   4. External hostnames (non-localhost) are preserved unchanged

- name: Unit test normalize-hostnames.yml
  hosts: all
  gather_facts: false

  tasks:

    # ── Test case 1: localhost/127.0.0.1 → Docker container names ────────────

    - name: "[TC1] Set all DB hostnames to localhost/127.0.0.1 (simulates post-bulk-load state)"
      ansible.builtin.set_fact:
        cas_db_hostname: "localhost"
        collectory_db_host_address: "127.0.0.1"
        collectory_db_host: "localhost"
        user_store_db_hostname: "localhost"
        apikey_db_hostname: "127.0.0.1"
        specieslist_db_hostname: "localhost"
        alerts_db_hostname: "localhost"
        logger_db_hostname: "localhost"
        doi_db_hostname: "localhost"
        image_service_db_host: "127.0.0.1"
        postgresql_host: "localhost"
        layers_db_host: "127.0.0.1"
        geonetwork_host: "localhost"
        ticket_registry_db_hostname: "localhost"
        cas_audit_host: "127.0.0.1"
        cas_spring_session_host: "localhost"
        cas_tickets_host: "localhost"
        cas_services_host: "127.0.0.1"
        ecodata_elasticsearch_host: "localhost"
        events_elasticsearch_host: "127.0.0.1"
        solr_host: "localhost"
        biocache_db_host: "127.0.0.1"
        solr_url: "localhost:2181"
        zk_host: "localhost:2181"
        solr_zk_host: "127.0.0.1:2181"
        mail_smtp_host: "localhost"
        docker_mail_development_mode: false

    - name: "[TC1] Run normalize-hostnames.yml"
      ansible.builtin.include_tasks: ../../roles/la-compose/tasks/normalize-hostnames.yml

    - name: "[TC1] Assert MySQL hostnames → 'mysql'"
      ansible.builtin.assert:
        that:
          - cas_db_hostname == 'mysql'
          - collectory_db_host_address == 'mysql'
          - collectory_db_host == 'mysql'
          - user_store_db_hostname == 'mysql'
          - apikey_db_hostname == 'mysql'
          - specieslist_db_hostname == 'mysql'
          - alerts_db_hostname == 'mysql'
          - logger_db_hostname == 'mysql'
        msg: >
          FAIL TC1-MySQL: expected all MySQL hostnames to equal 'mysql'.
          Got: cas_db_hostname={{ cas_db_hostname }},
          user_store_db_hostname={{ user_store_db_hostname }},
          logger_db_hostname={{ logger_db_hostname }}

    - name: "[TC1] Assert PostgreSQL hostnames → 'postgres'"
      ansible.builtin.assert:
        that:
          - doi_db_hostname == 'postgres'
          - image_service_db_host == 'postgres'
          - postgresql_host == 'postgres'
          - layers_db_host == 'postgres'
          - geonetwork_host == 'postgres'
        msg: >
          FAIL TC1-PG: expected PostgreSQL hostnames to equal 'postgres'.
          Got: doi_db_hostname={{ doi_db_hostname }},
          image_service_db_host={{ image_service_db_host }},
          postgresql_host={{ postgresql_host }}

    - name: "[TC1] Assert MongoDB hostnames → 'la_mongodb'"
      ansible.builtin.assert:
        that:
          - ticket_registry_db_hostname == 'la_mongodb'
          - cas_audit_host == 'la_mongodb'
          - cas_spring_session_host == 'la_mongodb'
          - cas_tickets_host == 'la_mongodb'
          - cas_services_host == 'la_mongodb'
        msg: >
          FAIL TC1-Mongo: expected MongoDB hostnames to equal 'la_mongodb'.
          Got: ticket_registry_db_hostname={{ ticket_registry_db_hostname }},
          cas_audit_host={{ cas_audit_host }}

    - name: "[TC1] Assert Elasticsearch hostnames → 'elasticsearch'"
      ansible.builtin.assert:
        that:
          - ecodata_elasticsearch_host == 'elasticsearch'
          - events_elasticsearch_host == 'elasticsearch'
        msg: >
          FAIL TC1-ES: expected Elasticsearch hostnames to equal 'elasticsearch'.
          Got: ecodata_elasticsearch_host={{ ecodata_elasticsearch_host }},
          events_elasticsearch_host={{ events_elasticsearch_host }}

    - name: "[TC1] Assert Solr, Cassandra, mail hostnames normalized"
      ansible.builtin.assert:
        that:
          - solr_host == 'solr'
          - biocache_db_host == 'cassandra'
          - mail_smtp_host == 'postfix'
        msg: >
          FAIL TC1-Other: expected solr→'solr', cassandra→'cassandra', mail→'postfix'.
          Got: solr_host={{ solr_host }}, biocache_db_host={{ biocache_db_host }},
          mail_smtp_host={{ mail_smtp_host }}

    - name: "[TC1] Assert ZooKeeper URLs → 'zookeeper:2181'"
      ansible.builtin.assert:
        that:
          - solr_url == 'zookeeper:2181'
          - zk_host == 'zookeeper:2181'
          - solr_zk_host == 'zookeeper:2181'
          - zookeeper_address == 'zookeeper:2181'
        msg: >
          FAIL TC1-ZK: expected all ZK URLs to equal 'zookeeper:2181'.
          Got: solr_url={{ solr_url }}, zk_host={{ zk_host }},
          solr_zk_host={{ solr_zk_host }},
          zookeeper_address={{ zookeeper_address }}

    # ── Test case 2: Idempotency ──────────────────────────────────────────────

    - name: "[TC2] Run normalize-hostnames.yml again (already-normalized input)"
      ansible.builtin.include_tasks: ../../roles/la-compose/tasks/normalize-hostnames.yml

    - name: "[TC2] Assert idempotency: values unchanged on second run"
      ansible.builtin.assert:
        that:
          - cas_db_hostname == 'mysql'
          - doi_db_hostname == 'postgres'
          - image_service_db_host == 'postgres'
          - postgresql_host == 'postgres'
          - ticket_registry_db_hostname == 'la_mongodb'
          - ecodata_elasticsearch_host == 'elasticsearch'
          - solr_host == 'solr'
          - biocache_db_host == 'cassandra'
          - mail_smtp_host == 'postfix'
          - solr_url == 'zookeeper:2181'
          - zk_host == 'zookeeper:2181'
          - solr_zk_host == 'zookeeper:2181'
          - zookeeper_address == 'zookeeper:2181'
        msg: "FAIL TC2: Idempotency broken - already-normalized values changed on second run"

    # ── Test case 3: Development mail mode → mailhog ─────────────────────────

    - name: "[TC3] Set mail hostname to localhost with dev mail mode enabled"
      ansible.builtin.set_fact:
        mail_smtp_host: "localhost"
        docker_mail_development_mode: true

    - name: "[TC3] Run normalize-hostnames.yml with dev mail mode"
      ansible.builtin.include_tasks: ../../roles/la-compose/tasks/normalize-hostnames.yml

    - name: "[TC3] Assert mail_smtp_host → 'mailhog' in dev mode"
      ansible.builtin.assert:
        that:
          - mail_smtp_host == 'mailhog'
        msg: >
          FAIL TC3: expected mail_smtp_host='mailhog' in dev mode,
          got mail_smtp_host={{ mail_smtp_host }}

    # ── Test case 4: External hostnames preserved ─────────────────────────────

    - name: "[TC4] Set external (non-localhost) DB hostnames"
      ansible.builtin.set_fact:
        cas_db_hostname: "db.internal.example.com"
        doi_db_hostname: "pg.internal.example.com"
        postgresql_host: "pg.internal.example.com"
        ticket_registry_db_hostname: "mongo.internal.example.com"
        ecodata_elasticsearch_host: "es.internal.example.com"
        solr_host: "solr.internal.example.com"
        biocache_db_host: "cassandra.internal.example.com"
        solr_url: "zk.internal.example.com:2181"
        zk_host: "zk.internal.example.com:2181"
        solr_zk_host: "zk.internal.example.com:2181"
        zookeeper_address: "zk.internal.example.com:2181"
        mail_smtp_host: "smtp.internal.example.com"
        docker_mail_development_mode: false

    - name: "[TC4] Run normalize-hostnames.yml with external hostnames"
      ansible.builtin.include_tasks: ../../roles/la-compose/tasks/normalize-hostnames.yml

    - name: "[TC4] Assert external hostnames unchanged"
      ansible.builtin.assert:
        that:
          - cas_db_hostname == 'db.internal.example.com'
          - doi_db_hostname == 'pg.internal.example.com'
          - postgresql_host == 'pg.internal.example.com'
          - ticket_registry_db_hostname == 'mongo.internal.example.com'
          - ecodata_elasticsearch_host == 'es.internal.example.com'
          - solr_host == 'solr.internal.example.com'
          - biocache_db_host == 'cassandra.internal.example.com'
          - solr_url == 'zk.internal.example.com:2181'
          - zk_host == 'zk.internal.example.com:2181'
          - solr_zk_host == 'zk.internal.example.com:2181'
          - zookeeper_address == 'zk.internal.example.com:2181'
          - mail_smtp_host == 'smtp.internal.example.com'
        msg: >
          FAIL TC4: External hostname was incorrectly overwritten.
          cas_db_hostname={{ cas_db_hostname }},
          doi_db_hostname={{ doi_db_hostname }},
          ticket_registry_db_hostname={{ ticket_registry_db_hostname }},
          solr_url={{ solr_url }}
