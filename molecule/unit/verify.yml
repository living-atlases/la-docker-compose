---
# All assertions are in converge.yml (facts don't persist across plays in delegated driver).
# This verify play confirms the test host is reachable and summarises the result.
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: All normalize-hostnames.yml assertions passed in converge
      ansible.builtin.debug:
        msg: "PASS: All 4 test cases completed successfully in converge.yml"
