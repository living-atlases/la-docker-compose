[defaults]
roles_path = ../ala-install/ansible/roles:../roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections
host_key_checking = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600
interpreter_python = auto_silent
# per-task timing is opt-in to keep CI/la-toolkit logs short.
# Re-enable when profiling: ANSIBLE_CALLBACKS_ENABLED=ansible.posix.profile_tasks
# callbacks_enabled = ansible.posix.profile_tasks

[ssh_connection]
# Latency optimisation for large task counts (e.g. nginx_vhost ~1360 small tasks over a
# high-RTT link). These only change the SSH *transport*, never task order or concurrency:
# per-host tasks stay strictly sequential; hosts already run in parallel (no serial: in
# site.yml). ControlPersist reuses one SSH connection across tasks; pipelining collapses
# put-file+exec into a single exec. Note: pipelining needs requiretty disabled in the
# target's sudoers (default on modern Ubuntu; no become_method: su is used in the roles).
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o PreferredAuthentications=publickey
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml
