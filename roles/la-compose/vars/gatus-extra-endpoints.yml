---
# Checks curados de Gatus para l-a.site — adaptados de gatus_endpoints de gbif.es
# (~/dev/ansible-common/inventory.ini). Aquí en YAML multi-línea legible y versionado,
# NO en una sola línea ni en la inventory autogenerada.
#
# Estos checks NO se autogeneran desde nginx_paths (eso lo hace el rol nginx_vhost con
# condición simple [STATUS] < 500). Son checks profundos de API, caducidad de
# certificados TLS y resolución DNS.
#
# Renderizado por: roles/la-compose/templates/docker-compose/gatus/extra-checks.yaml.j2
# → {{ docker_compose_data_dir }}/gatus/config/extra-checks.yaml (Gatus auto-mergea).
#
# Cada entrada admite: name / group / url / conditions[] / interval? / client? / dns?
# Defaults del renderer: conditions=['[STATUS] < 400'], interval=gatus_interval (1m).

# Dominio base: único punto a cambiar para reusar en otro despliegue.
gatus_base_domain: "l-a.site"

gatus_extra_endpoints:

  # ---------------------------------------------------------------------------
  # Deep API / funcionales — solo status + patrones de error de framework
  # (no dependen de datos concretos del despliegue).
  # ---------------------------------------------------------------------------
  - name: "records-ws occurrences search"
    group: "Deep checks"
    url: "https://records-ws.{{ gatus_base_domain }}/occurrences/search?q=*:*&pageSize=0"
    conditions: ["[STATUS] < 400"]

  - name: "records-ws index fields"
    group: "Deep checks"
    url: "https://records-ws.{{ gatus_base_domain }}/index/fields"
    conditions: ["[STATUS] < 400"]

  - name: "species search"
    group: "Deep checks"
    url: "https://species.{{ gatus_base_domain }}/search?q=Acacia"
    conditions: ["[STATUS] < 400", "[BODY] != pat(*Application error*)"]

  - name: "species-ws name search"
    group: "Deep checks"
    url: "https://species-ws.{{ gatus_base_domain }}/search?q=Acacia"
    conditions: ["[STATUS] < 400"]

  - name: "collections ws"
    group: "Deep checks"
    url: "https://collections.{{ gatus_base_domain }}/ws"
    conditions: ["[STATUS] < 400"]

  - name: "spatial ws fields"
    group: "Deep checks"
    url: "https://spatial.{{ gatus_base_domain }}/ws/fields"
    conditions: ["[STATUS] < 400"]

  - name: "spatial geoserver"
    group: "Deep checks"
    url: "https://spatial.{{ gatus_base_domain }}/geoserver/web/"
    conditions: ["[STATUS] < 400", "[BODY] != pat(*An error has occurred*)"]

  - name: "lists ws"
    group: "Deep checks"
    url: "https://lists.{{ gatus_base_domain }}/ws/speciesList"
    conditions: ["[STATUS] < 400"]

  - name: "logger reasons"
    group: "Deep checks"
    url: "https://logger.{{ gatus_base_domain }}/service/logger/reasons"
    conditions: ["[STATUS] < 400"]

  - name: "namematching search"
    group: "Deep checks"
    url: "https://namematching.{{ gatus_base_domain }}/api/search?q=Acacia"
    conditions: ["[STATUS] < 400"]

  # SDS deshabilitado por ahora: sds-static-home / sensitive-data-service no tienen grupo
  # de inventario, así que no se genera contenedor y sds.l-a.site no resuelve → check siempre
  # rojo. Descomentar cuando SDS se despliegue de verdad. Ver también "Cert expiry - sds".
  # - name: "sds isSensitive"
  #   group: "Deep checks"
  #   url: "https://sds.{{ gatus_base_domain }}/api/isSensitive?scientificName=Lynx%20pardinus"
  #   conditions: ["[STATUS] < 400"]

  # ---------------------------------------------------------------------------
  # TLS certs — caducidad (336h = 14 días). Uno por FQDN público con vhost.
  # Grupo nombrado "TLS certs" (no "Certs") para que ordene AL FINAL: gatus ordena
  # los grupos alfabéticamente y "Certs" caía arriba, dominando la cabecera en rojo.
  # NOTA topología: gatus alcanza el cert del nginx interno (volumen la-site-certs,
  # imagen livingatlases/l-a-site-certs, pull_policy: always), que se refresca en cada
  # deploy; un rojo REAL daría [CERTIFICATE_EXPIRATION] con horas > 0 pero < 336h →
  # refrescar esa imagen.
  # SIN dns-resolver externo: el 1.1.1.1:53 (DNS-over-TCP) que había aquí NO cambiaba el
  # cert visto (seguía siendo el interno) y, al dispararse juntas las ~17 checks,
  # provocaba timeouts transitorios → [CERTIFICATE_EXPIRATION] (0s) → rojo espurio. Con
  # el resolver local del contenedor + interval 15m (gatus NO reintenta por sonda) el
  # flapping desaparece. Si deshabilitas un servicio, comenta su línea (no resolvería).
  # ---------------------------------------------------------------------------
  - name: "Cert expiry - root"
    group: "TLS certs"
    url: "https://{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - records"
    group: "TLS certs"
    url: "https://records.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - records-ws"
    group: "TLS certs"
    url: "https://records-ws.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - species"
    group: "TLS certs"
    url: "https://species.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - species-ws"
    group: "TLS certs"
    url: "https://species-ws.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - collections"
    group: "TLS certs"
    url: "https://collections.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - images"
    group: "TLS certs"
    url: "https://images.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - lists"
    group: "TLS certs"
    url: "https://lists.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - spatial"
    group: "TLS certs"
    url: "https://spatial.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - logger"
    group: "TLS certs"
    url: "https://logger.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - regions"
    group: "TLS certs"
    url: "https://regions.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - alerts"
    group: "TLS certs"
    url: "https://alerts.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - doi"
    group: "TLS certs"
    url: "https://doi.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - data-quality"
    group: "TLS certs"
    url: "https://data-quality.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - namematching"
    group: "TLS certs"
    url: "https://namematching.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  # SDS deshabilitado por ahora (sin grupo de inventario → sds.l-a.site no resuelve).
  # Descomentar cuando SDS se despliegue. Ver "sds isSensitive" arriba.
  # - name: "Cert expiry - sds"
  #   group: "TLS certs"
  #   url: "https://sds.{{ gatus_base_domain }}/"
  #   interval: "15m"
  #   conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - auth"
    group: "TLS certs"
    url: "https://auth.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]
  - name: "Cert expiry - gatus"
    group: "TLS certs"
    url: "https://gatus.{{ gatus_base_domain }}/"
    interval: "15m"
    conditions: ["[CERTIFICATE_EXPIRATION] > 336h"]

  # ---------------------------------------------------------------------------
  # DNS — registro A vía resolver público 1.1.1.1 (salida pública del contenedor).
  # ---------------------------------------------------------------------------
  - name: "DNS A - root"
    group: "DNS"
    url: "1.1.1.1"
    interval: "15m"
    dns: { query-name: "{{ gatus_base_domain }}", query-type: "A" }
    conditions: ["[DNS_RCODE] == NOERROR", "[BODY] != "]
  - name: "DNS A - records"
    group: "DNS"
    url: "1.1.1.1"
    interval: "15m"
    dns: { query-name: "records.{{ gatus_base_domain }}", query-type: "A" }
    conditions: ["[DNS_RCODE] == NOERROR", "[BODY] != "]
  - name: "DNS A - species"
    group: "DNS"
    url: "1.1.1.1"
    interval: "15m"
    dns: { query-name: "species.{{ gatus_base_domain }}", query-type: "A" }
    conditions: ["[DNS_RCODE] == NOERROR", "[BODY] != "]
  - name: "DNS A - collections"
    group: "DNS"
    url: "1.1.1.1"
    interval: "15m"
    dns: { query-name: "collections.{{ gatus_base_domain }}", query-type: "A" }
    conditions: ["[DNS_RCODE] == NOERROR", "[BODY] != "]
  - name: "DNS A - spatial"
    group: "DNS"
    url: "1.1.1.1"
    interval: "15m"
    dns: { query-name: "spatial.{{ gatus_base_domain }}", query-type: "A" }
    conditions: ["[DNS_RCODE] == NOERROR", "[BODY] != "]
