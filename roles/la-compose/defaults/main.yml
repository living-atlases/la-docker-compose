---
# Docker Compose Role Defaults
# Variables for docker-compose deployment

# ============================================
# Core Configuration
# ============================================

# Deployment type and environment
deployment_type: container  # Fixed for docker-compose
deployment_env: production  # Options: dev, staging, production

# Auto-deploy: Start services after generating config (like traditional ala-install)
auto_deploy: true

# Docker Compose profiles to activate (comma-separated)
# infra: nginx, certs, branding | monitoring: gatus | core-auth: CAS stack | app-core: LA apps | full: all
compose_profiles: "full"

# User for docker operations (uses current user or 'ubuntu' for VM)
# docker_default_user is now defined globally in the inventory [all:vars]

# Skip handlers as we're generating docker-compose files, not deploying to VMs
skip_handlers: true

supported_ansible_version: {full: 2.17.3, major: 2, minor: 17, revision: 3}

# Instance name for docker-compose project identification
# Used for docker compose --project-name and container naming
# Defaults to short hostname for uniqueness per deployment
instance_name: "{{ inventory_hostname_short | default(inventory_hostname) }}"

# ============================================
# i18n Configuration
# ============================================

i18n:
  enabled: true
  strategy: volume
  volume:
    name: ala-i18n-data
    source: init-container

# ============================================
# Docker Compose Container Names
# ============================================

# Fallback for upstream templates (species-list, logger-service) that gate on
# {% if mysql == 'mysql-server-8.0' %}. The `mysql` fact is normally set by
# ala-install/.../common/tasks/setfacts.yml — but only for Ubuntu 14/18/20/22/24.
# On Debian (no matching block) the var stays undefined and template rendering
# fails. Define a fallback so container deployments work on any host OS.
mysql: "mysql-server-8.0"

# MySQL and MongoDB container names
cas_db_hostname: mysql
collectory_db_host_address: mysql
collectory_db_host: mysql
user_store_db_hostname: mysql
apikey_db_hostname: mysql
specieslist_db_hostname: mysql

# MongoDB container names for CAS
ticket_registry_db_hostname: la_mongodb
cas_audit_host: la_mongodb
cas_spring_session_host: la_mongodb
cas_tickets_host: la_mongodb
cas_services_host: la_mongodb

# ============================================
# Docker Users
# ============================================

# Container runtime UID/GID - MUST match la-docker-images Dockerfiles
# All ALA service containers run as uid/gid 1000 (hardcoded in la-docker-images)
# This ensures config files created by Ansible can be read by containers
docker_container_uid: 1000
docker_container_gid: 1000

# Service user variables - will be overridden in generate-compose.yml
# These defaults are here for reference but are immediately replaced
tomcat_user: "{{ docker_default_user }}"
cas_user: "{{ docker_default_user }}"
collectory_user: "{{ docker_default_user }}"
userdetails_user: "{{ docker_default_user }}"
apikey_user: "{{ docker_default_user }}"
species_list_user: "{{ docker_default_user }}"

# ============================================
# Directory Configuration
# ============================================

data_dir: /data
docker_compose_data_dir: /data/docker-compose
# Host path where Ansible writes nginx tree (conf.d, sites-*). Container paths in generated
# nginx.conf still come from nginx_conf_path / nginx_vhost_path (typically under /etc/nginx).
nginx_conf_dir: "{{ docker_compose_data_dir }}/nginx"
docker_output_dir: "{{ docker_compose_output_dir | default('docker-compose-output') }}"

# ============================================
# Build Configuration
# ============================================

build_images: true
docker_registry: ""
docker_tag: "{{ collectory_branch | default(collectory_version | default('develop')) }}"
docker_image_tag: "{{ docker_tag }}"
docker_cache_tag: "buildcache"
docker_build_cache_dir: "{{ ansible_env.HOME }}/.cache/docker-buildx"

# ============================================
# Network Configuration
# ============================================

docker_network: internal
docker_network_mtu: 1500
docker_extra_hosts: []
nginx_docker_internal_aliases: []
docker_socket: unix:///var/run/docker.sock

# Cross-host datastore reachability (VM model, NO swarm).
# When the deployment spans more than one docker_compose host, datastore
# containers (cassandra/solr/zookeeper/mysql/postgres) publish their port on the
# host private IP so remote consumers can reach them via host:port + static DNS
# (extra_hosts). Computed in generate-compose.yml; defaults here keep single-host
# behaviour unchanged (no publishing, bind nothing extra).
publish_db_ports_clusterwide: false
# Private IP this host binds published datastore ports to (overridden in
# generate-compose.yml from hostvars[inventory_hostname].ansible_host).
host_private_ip: "0.0.0.0"

# ============================================
# Java Memory Configuration
# ============================================

tomcat_java_opts: "-Xmx2g -Xms2g -Xss512k -Djava.awt.headless=true"
set_sql_mode: true

# ============================================
# Docker Service Internal Ports
# ============================================

cas_port: 9000
cas_management_port: 8070
userdetails_port: 9001
apikey_port: 9002
collectory_port: 8080
bie_hub_port: 8080
bie_index_port: 8080
biocache_hub_port: 8080
biocache_service_port: 8080
image_service_port: 8080
logger_service_port: 8080
namematching_service_port: 9179
namematching_admin_port: 9180
doi_service_port: 8080
sensitive_data_service_port: 9189
sensitive_data_admin_port: 9190
species_list_port: 8080

# ============================================
# Docker Container Hostnames for Nginx
# ============================================

cas_docker_host: la_cas
userdetails_docker_host: la_userdetails
cas_management_docker_host: la_cas-management
apikey_docker_host: la_apikey
collectory_docker_host: la_collectory
bie_hub_docker_host: la_bie-hub
bie_index_docker_host: la_bie-index
biocache_hub_docker_host: la_biocache-hub
biocache_service_docker_host: la_biocache-service
image_service_docker_host: la_image-service
logger_service_docker_host: la_logger-service
namematching_service_docker_host: la_namematching-service
doi_service_docker_host: la_doi-service
sensitive_data_service_docker_host: la_sensitive-data-service
species_list_docker_host: la_species-list

# Airflow (NO-AWS pipelines-airflow overlay): OPT-IN. Set use_airflow=true to deploy
# the overlay (Airflow + MinIO, separate compose project) joined to the `la` network as
# `la_airflow`. Define airflow_hostname (e.g. airflow.l-a.site) to also expose it via
# nginx + gatus. Follows the use_* pattern; promotable to the generator/la-toolkit toggles.
use_airflow: false
airflow_docker_host: la_airflow
airflow_port: 8080

# ============================================
# Service-Specific Configuration
# ============================================

biocache_hub: ala-hub
grouped_facets_json: grouped_facets_ala.json
biocache_hub_tomcat_server_address: "0.0.0.0"

# Docker image tags for namematching/SDS servers. The inventory pins these vars
# to Debian apt-package versions (e.g. 1.2-SNAPSHOT+0~...), which are INVALID as
# Docker tags. The livingatlases/ala-{namematching,sensitive-data}-server images
# only publish a `latest` tag, so default to that. Override per-inventory if a
# real tag is ever published.
namematching_docker_tag: "latest"
sensitive_data_docker_tag: "latest"

# ============================================
# Services Configuration
# ============================================

services_enabled: []

# Lista TEMPORAL de servicios a omitir en el despliegue (nombres de grupo de inventario),
# p.ej. ['sds-static-home','sensitive-data-service']. Vacío = desplegar todo.
# Se pasa por ansiblew -e o por el parámetro SKIP_SERVICES de Jenkins. No tocar inventarios.
skip_services: []

# ============================================
# Nginx Configuration
# ============================================

docker_nginx_version: "1.25"

# Nginx container paths (override host-specific paths from nginx role)
nginx_user: nginx
nginx_pidfile: /var/run/nginx.pid
nginx_conf_path: /etc/nginx/conf.d
nginx_vhost_path: /etc/nginx/sites-enabled
nginx_mime_file_path: /etc/nginx/mime.types
nginx_error_log: "/var/log/nginx/error.log notice"
nginx_access_log: "/var/log/nginx/access.log main"

# ============================================
# Branding Configuration
# ============================================

# use_branding gates applying the branding (currently only the Spatial Portal skin). Branding is
# non-optional in la-toolkit (LAServiceDesc optional:false), so it is always configured — key off
# branding_source (a cluster-wide inventory var) rather than the PER-HOST services_to_build, so the
# Spatial skin auto-applies on the host that runs spatial-hub (not just the branding-build host). The
# skin auto-detect + deploy guard still fall back to 'portal' if the branding lacks app/spatial/spatial-layout.gsp.
use_branding: "{{ branding_source is defined and branding_source is not none }}"
branding_source: null
branding_url: "branding"
branding_node_version: "18"
branding_version: "latest"
branding_git_ref: "master"
branding_dev_mode: false
branding_dev_port: "3000"
branding_git_watch: false
branding_git_check_interval: "300"

# Spatial Portal skin layout. Auto: use the header base-branding generates (dist/spatial/, mounted
# read-only at /data/spatial-hub/views) when the branding actually ships it, else the stock 'portal'
# layout — so enabling branding never breaks spatial-hub, old or new. Availability is detected in
# generate-compose.yml (spatial_branding_skin_available): automatic for a LOCAL branding source;
# for a git-URL branding set this to 'spatial-layout' explicitly (a deploy-time guard then verifies
# it). An explicit value here always wins. 'generic' = in-WAR layout driven by header_and_footer_baseurl
# (reuses the branding banner/footer, no mount needed).
spatial_hub_skin_layout: "{{ 'spatial-layout' if (spatial_branding_skin_available | default(false) | bool) else 'portal' }}"

# ============================================
# Monitoring
# ============================================

monitoring_enabled: false

# Gatus health-check interval (default 5m in upstream role; tightened for docker-compose dev)
gatus_interval: "1m"

# Gatus "Up" condition fed to the upstream gatus role's http.j2 (default there is
# '[STATUS] == 200'). ALA endpoints behind CAS legitimately return 302/401/403 (and
# param-less API paths 400/404) while healthy, so ==200 produces massive false-reds.
# '< 500' keeps only real outages red (502/503/504/timeout/no upstream).
gatus_up_condition: "[STATUS] < 500"

# Post-deploy health gate timeout (seconds). validate-post-deploy.yml passes this
# to wait-for-health.sh --timeout. Raised from 300 to accommodate cassandra cold-start:
# start_period 120s + schema load (la_cassandra_init cqlsh) + biocache-service retry
# all need to fit within this window on a clean host.
# Raised 480->720 after #249: with CLEAN_MACHINE wiping the external datastore volumes
# (0d51fc1), the first fresh-volume boot is slower and bie-hub (slow Grails hub whose /
# healthcheck also waits on branding) exceeded 480s -> gate timed out -> converge restarted
# it (counter-productive: reset its warmup) -> build FAILURE. 720s lets bie-hub serve a
# branded 200 without the restart.
health_check_timeout: 720

# ============================================
# SSL / Certificates
# ============================================

# Use livingatlases/l-a-site-certs Docker image for demo SSL certs (l-a.site wildcard).
#
# Decided upstream by generator-living-atlas: when the deployment domain (LA_domain)
# is l-a.site or a subdomain, the generated inventory sets use_la_site_certs=true
# (demo wildcard certs); for any other (real) domain it is false, and the deploy
# must provide its own certs via ssl_certificate_server_dir / ssl_cert_file /
# ssl_key_file. An explicit value in the toolkit/inventory always wins.
#
# la-compose performs NO domain detection; generate-compose.yml only normalises
# this to a boolean with a false fallback for hand-written inventories that omit it.
# use_la_site_certs: false
ssl_certificate_server_dir: "/etc/letsencrypt/live"
ssl_cert_file: "fullchain.pem"
ssl_key_file: "privkey.pem"

# ============================================
# Nginx / Webserver
# ============================================

# Docker deployments always use nginx as the reverse proxy.
webserver_nginx: true
# Suppress warning about undefined nginx_vhost_fragments_to_clear (not needed for docker).
nginx_vhost_fragments_to_clear_no_warning: true

# ============================================
# Redeploy safety (production)
# ============================================

# Environment designation: ci | staging | production. In production,
# enforce-production-safety.yml fails the deploy if any destructive flag
# (docker_force_recreate, force_db_init, allow_service_removal,
# docker_desktop_workaround) is set — the operator must drop the flag, there is
# no silent override. Set in the inventory ([all:vars] la_env=production).
la_env: ci

# Remove la_nginx before `compose up`. Only needed on Docker Desktop, whose
# port-forwarder holds :80/:443 bindings after stop. On Linux hosts (CI VMs,
# production) nginx must be left running: config changes are applied with a
# graceful `nginx -s reload` (zero downtime) instead of a container recreate.
docker_desktop_workaround: false

# `docker compose up --remove-orphans` deletes any running container whose
# service disappeared from the generated compose (generation bug, SKIP_SERVICES
# change, incomplete inventory). validate-service-consistency.yml aborts the
# deploy in that case unless this is explicitly set to true for an intentional
# service removal.
allow_service_removal: false

# Restart services whose bind-mounted config content changed since the last
# deploy (compose only recreates on service-definition changes, never on
# mounted-file content). Snapshots live in
# {{ docker_compose_data_dir }}/.config-hashes/. nginx is excluded (reload).
config_change_restart: true

# Dump MySQL/MongoDB/PostgreSQL (auth users, registry, metadata DBs) before the
# deploy mutates anything — the container equivalent of ala-install's db-backup
# role (mysqldump/pg_dump/mongodump invoked before each service role). Enabled
# by default in production; CI machines are disposable so they skip the cost.
# Big re-generable datastores (Cassandra/Solr/ES) are NOT dumped.
pre_deploy_backup: "{{ (la_env | default('ci')) == 'production' }}"
la_backup_dir: "{{ data_dir }}/backups/pre-deploy"
# How many timestamped backup sets to keep (older ones are pruned).
pre_deploy_backup_keep: 7
