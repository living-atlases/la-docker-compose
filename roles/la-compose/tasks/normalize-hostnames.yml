---
# Reusable task file to normalize database hostnames for Docker network
# This should be included AFTER any bulk load that may have overwritten normalized values
# with inventory values containing 'localhost' or '127.0.0.1'
#
# Usage:
#   - name: Re-normalize database hostnames after bulk load
#     include_tasks: normalize-hostnames.yml
#     tags: [config, normalize]

- name: Re-normalize database hostnames for Docker network (post bulk-load)
  set_fact:
    # MySQL hostnames (cas, userdetails, apikey, collectory, species-list, logger, alerts)
    cas_db_hostname: "{{ 'mysql' if (cas_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else cas_db_hostname }}"
    collectory_db_host_address: >-
      {{ 'mysql' if (collectory_db_host_address | default('localhost') in ['localhost', '127.0.0.1'])
         else collectory_db_host_address }}
    collectory_db_host: "{{ 'mysql' if (collectory_db_host | default('localhost') in ['localhost', '127.0.0.1']) else collectory_db_host }}"
    user_store_db_hostname: "{{ 'mysql' if (user_store_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else user_store_db_hostname }}"
    apikey_db_hostname: "{{ 'mysql' if (apikey_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else apikey_db_hostname }}"
    specieslist_db_hostname: "{{ 'mysql' if (specieslist_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else specieslist_db_hostname }}"
    alerts_db_hostname: "{{ 'mysql' if (alerts_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else alerts_db_hostname }}"
    logger_db_hostname: "{{ 'mysql' if (logger_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else logger_db_hostname }}"
    # PostgreSQL hostnames (doi, image-service, layers/spatial, geonetwork)
    # NOTE: doi uses jdbc:postgresql:// per ala-install/roles/doi-service role
    doi_db_hostname: "{{ 'postgres' if (doi_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else doi_db_hostname }}"
    image_service_db_host: "{{ 'postgres' if (image_service_db_host | default('localhost') in ['localhost', '127.0.0.1']) else image_service_db_host }}"
    postgresql_host: "{{ 'postgres' if (postgresql_host | default('localhost') in ['localhost', '127.0.0.1']) else postgresql_host }}"
    layers_db_host: "{{ 'postgres' if (layers_db_host | default('localhost') in ['localhost', '127.0.0.1']) else layers_db_host }}"
    geonetwork_host: "{{ 'postgres' if (geonetwork_host | default('localhost') in ['localhost', '127.0.0.1']) else geonetwork_host }}"

    # MongoDB hostnames (CAS ticket registry, audit, sessions)
    ticket_registry_db_hostname: >-
      {{ 'la_mongodb' if (ticket_registry_db_hostname | default('localhost') in ['localhost', '127.0.0.1', 'mongodb'])
         else ticket_registry_db_hostname }}
    cas_audit_host: "{{ 'la_mongodb' if (cas_audit_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_audit_host }}"
    cas_spring_session_host: "{{ 'la_mongodb' if (cas_spring_session_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_spring_session_host }}"
    cas_tickets_host: "{{ 'la_mongodb' if (cas_tickets_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_tickets_host }}"
    cas_services_host: "{{ 'la_mongodb' if (cas_services_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_services_host }}"

    # Elasticsearch hostnames (ecodata, events)
    ecodata_elasticsearch_host: "{{ 'elasticsearch' if (ecodata_elasticsearch_host | default('localhost') in ['localhost', '127.0.0.1']) else ecodata_elasticsearch_host }}"
    events_elasticsearch_host: "{{ 'elasticsearch' if (events_elasticsearch_host | default('localhost') in ['localhost', '127.0.0.1']) else events_elasticsearch_host }}"

    # Solr and Cassandra
    solr_host: "{{ 'solr' if (solr_host | default('localhost') in ['localhost', '127.0.0.1']) else solr_host }}"
    biocache_db_host: "{{ 'cassandra' if (biocache_db_host | default('localhost') in ['localhost', '127.0.0.1']) else biocache_db_host }}"

    # Solr/ZooKeeper URLs — point at the standalone `zookeeper` compose service,
    # not at `solr` (the embedded ZK isn't used; mirrors production where Solr
    # talks to an external ZK ensemble). biocache-service consumes solr_url as
    # its ZK address in SolrCloud mode.
    solr_url: "{{ 'zookeeper:2181' if (solr_url | default('localhost:2181') in ['localhost:2181', '127.0.0.1:2181', 'localhost', '127.0.0.1']) else solr_url }}"
    zk_host: "{{ 'zookeeper:2181' if (zk_host | default('localhost:2181') in ['localhost:2181', '127.0.0.1:2181', 'localhost', '127.0.0.1']) else zk_host }}"
    solr_zk_host: "{{ 'zookeeper:2181' if (solr_zk_host | default('localhost:2181') in ['localhost:2181', '127.0.0.1:2181', 'localhost', '127.0.0.1']) else solr_zk_host }}"
    # Synthesize zookeeper_address from solr_url to fill the
    # ala-install/biocache-properties template (line 46:
    # `zookeeper.address = {{ zookeeper_address | default('') }}`). Without
    # this the property is empty and biocache falls back to broken defaults.
    # Same pattern as cas_db_hostname/mysql — no changes to inventories or
    # ala-install. `default(solr_url)` keeps VM deploys backward-compatible
    # if they ever define zookeeper_address explicitly.
    zookeeper_address: "{{ zookeeper_address | default(solr_url) }}"

    # Mail host (mailhog in dev mode, postfix in production)
    mail_smtp_host: >-
      {{ 'mailhog' if (docker_mail_development_mode | default(false) | bool and
         mail_smtp_host | default('localhost') in ['localhost', '127.0.0.1'])
         else ('postfix' if (not (docker_mail_development_mode | default(false) | bool) and
         mail_smtp_host | default('localhost') in ['localhost', '127.0.0.1'])
         else mail_smtp_host | default('postfix')) }}
  tags:
    - config
    - normalize
    - docker-compose
