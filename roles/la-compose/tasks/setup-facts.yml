---
# setup-facts.yml - Calculate deployment facts for docker-compose
# Used by ensure-db-volumes.yml and generate-compose.yml

- name: Include services descriptions
  include_vars:
    file: docker-services-desc.yaml
  tags:
    - always
    - only
    - docker-compose

- name: Set docker_services_desc as a clean variable
  set_fact:
    docker_services_desc: "{{ docker_services_desc }}"
  tags:
    - always
    - only
    - docker-compose

# Find all hosts that share the same physical server (ansible_host) as this docker_compose host
- name: Find all service groups deployed on this physical server
  set_fact:
    physical_server_groups: >-
      {%- set result = [] -%}
      {%- for host in groups['all'] -%}
        {%- if hostvars[host].get('ansible_host', host) == hostvars[inventory_hostname].get('ansible_host', inventory_hostname) -%}
          {%- for group in hostvars[host].get('group_names', []) -%}
            {%- if group not in ['all', 'docker_compose', 'docker-common', 'ungrouped'] and not group.endswith('_group') -%}
              {%- set _ = result.append(group) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result | unique | list }}

  tags:
    - always
    - docker-compose

- name: Detect enabled services from physical server groups (based on group defined in docker_services_desc)
  set_fact:
    services_enabled: "{{ services_enabled | default([]) + ([item.key] if (
      (item.value.isSubService | default(false) and docker_services_desc[item.value.parentService].group in physical_server_groups) or
      (not item.value.isSubService | default(false) and item.value.group in physical_server_groups)
    ) else []) }}"
  loop: "{{ docker_services_desc | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags:
    - always
    - docker-compose

# --- skip_services (flag temporal) ---------------------------------------
# Permite omitir servicios en tiempo de ejecución sin tocar inventarios.
# Acepta nombres de grupo de inventario (p.ej. 'sensitive-data-service') o
# claves de docker_services_desc (p.ej. 'sensitiveDataService').
- name: Normalize skip_services (allow comma-separated string)
  set_fact:
    skip_services: >-
      {{ (skip_services.split(',') | map('trim') | list)
         if (skip_services is string) else (skip_services | default([])) }}
  tags:
    - always
    - docker-compose

- name: Apply skip_services to services_enabled
  set_fact:
    services_enabled: >-
      {{ services_enabled
         | reject('in', skip_services)
         | reject('in', docker_services_desc | dict2items
             | selectattr('value.group', 'in', skip_services)
             | map(attribute='key') | list)
         | list }}
  when: skip_services | length > 0
  tags:
    - always
    - docker-compose

- name: Determine if MySQL is required
  set_fact:
    enable_mysql: >-
      {{
        'mysql' in physical_server_groups
        or 'cas-servers' in physical_server_groups
        or 'collectory' in physical_server_groups
        or 'species-list' in physical_server_groups
        or 'logger-service' in physical_server_groups
        or 'alerts-service' in physical_server_groups
      }}
    enable_postgres: >-
      {{
        'postgres' in physical_server_groups
        or 'spatial' in physical_server_groups
        or 'image-service' in physical_server_groups
        or 'doi-service' in physical_server_groups
        or 'data_quality_filter_service' in physical_server_groups
      }}
    enable_mongo: >-
      {{
        'mongo' in physical_server_groups
        or 'mongodb' in physical_server_groups
        or 'cas-servers' in physical_server_groups
        or 'ecodata' in physical_server_groups
      }}
  tags:
    - always
    - docker-compose

# Calculate service aliases for explicit variable loading
# Maps each service group to its corresponding inventory hostname alias (e.g., 'cas-servers' -> 'test-host.cas')
# Used in generate-compose.yml to load service-specific variables via hostvars[]
- name: Calculate service alias hostnames for variable loading
  set_fact:
    service_aliases: >-
      {%- set result = {} -%}
      {%- for service in [
        'cas-servers', 'collectory', 'species-list', 'bie-hub', 'bie-index', 'biocache-hub',
        'biocache-service-clusterdb', 'logger-service', 'image-service', 'namematching-service',
        'sensitive-data-service', 'gatus',
        'alerts-service', 'regions', 'doi-service', 'data_quality_filter_service',
        'spatial', 'spatial-service',
      ] -%}
        {%- if service in groups -%}
          {%- set matching = groups[service] | select('match', '^' + ansible_host + '(\\..+)?$') | list -%}
          {%- if matching | length > 0 -%}
            {%- set _ = result.update({service: matching[0]}) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  tags:
    - always
    - docker-compose

- name: Normalize database hostnames for Docker network
  set_fact:
    cas_db_hostname: "{{ 'mysql' if (cas_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else cas_db_hostname }}"
    collectory_db_host_address: >-
      {{ 'mysql' if (collectory_db_host_address | default('localhost') in ['localhost', '127.0.0.1'])
         else collectory_db_host_address }}
    collectory_db_host: "{{ 'mysql' if (collectory_db_host | default('localhost') in ['localhost', '127.0.0.1']) else collectory_db_host }}"
    user_store_db_hostname: "{{ 'mysql' if (user_store_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else user_store_db_hostname }}"
    apikey_db_hostname: "{{ 'mysql' if (apikey_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else apikey_db_hostname }}"
    specieslist_db_hostname: "{{ 'mysql' if (specieslist_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else specieslist_db_hostname }}"
    alerts_db_hostname: "{{ 'mysql' if (alerts_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else alerts_db_hostname }}"
    doi_db_hostname: "{{ 'mysql' if (doi_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else doi_db_hostname }}"
    logger_db_hostname: "{{ 'mysql' if (logger_db_hostname | default('localhost') in ['localhost', '127.0.0.1']) else logger_db_hostname }}"

    postgresql_host: "{{ 'postgres' if (postgresql_host | default('localhost') in ['localhost', '127.0.0.1']) else postgresql_host }}"
    layers_db_host: "{{ 'postgres' if (layers_db_host | default('localhost') in ['localhost', '127.0.0.1']) else layers_db_host }}"
    geonetwork_host: "{{ 'postgres' if (geonetwork_host | default('localhost') in ['localhost', '127.0.0.1']) else geonetwork_host }}"

    ticket_registry_db_hostname: >-
      {{ 'la_mongodb' if (ticket_registry_db_hostname | default('localhost') in ['localhost', '127.0.0.1', 'mongodb'])
         else ticket_registry_db_hostname }}
    cas_audit_host: "{{ 'la_mongodb' if (cas_audit_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_audit_host }}"
    cas_spring_session_host: "{{ 'la_mongodb' if (cas_spring_session_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_spring_session_host }}"
    cas_tickets_host: "{{ 'la_mongodb' if (cas_tickets_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_tickets_host }}"
    cas_services_host: "{{ 'la_mongodb' if (cas_services_host | default('localhost') in ['localhost', '127.0.0.1', 'mongodb']) else cas_services_host }}"

    solr_host: "{{ 'solr' if (solr_host | default('localhost') in ['localhost', '127.0.0.1']) else solr_host }}"
    biocache_db_host: "{{ 'cassandra' if (biocache_db_host | default('localhost') in ['localhost', '127.0.0.1']) else biocache_db_host }}"
    mail_smtp_host: >-
      {{ 'mailhog' if (docker_mail_development_mode | default(false) | bool and
         mail_smtp_host | default('localhost') in ['localhost', '127.0.0.1'])
         else ('postfix' if (not (docker_mail_development_mode | default(false) | bool) and
         mail_smtp_host | default('localhost') in ['localhost', '127.0.0.1'])
         else mail_smtp_host | default('postfix')) }}
    # grails-mail convention (userdetails, merit, ecodata, biocollect, webapi,
    # logger). Resolved here in setup-facts so the value exists before the
    # userdetails role is rendered by generate-compose. dev → mailhog:1025,
    # external inventory host → kept as-is, otherwise → postfix:25.
    mail_host: >-
      {{ 'mailhog' if (docker_mail_development_mode | default(false) | bool and
         mail_host | default('localhost') in ['localhost', '127.0.0.1'])
         else ('postfix' if (not (docker_mail_development_mode | default(false) | bool) and
         mail_host | default('localhost') in ['localhost', '127.0.0.1'])
         else mail_host | default('postfix')) }}
    mail_port: >-
      {{ 1025 if (docker_mail_development_mode | default(false) | bool and
         mail_host | default('localhost') in ['localhost', '127.0.0.1'])
         else (25 if (not (docker_mail_development_mode | default(false) | bool) and
         mail_host | default('localhost') in ['localhost', '127.0.0.1'])
         else (mail_port | default(mail_smtp_port) | default(25))) }}
    mail_smtp_port: >-
      {{ 1025 if (docker_mail_development_mode | default(false) | bool and
         mail_smtp_host | default('localhost') in ['localhost', '127.0.0.1'])
         else (25 if (not (docker_mail_development_mode | default(false) | bool) and
         mail_smtp_host | default('localhost') in ['localhost', '127.0.0.1'])
         else (mail_smtp_port | default(mail_port) | default(25))) }}
  tags:
    - always
    - docker-compose

# Auto-detect SHARED-DOMAIN vhosts: several services on ONE subdomain (e.g. spatial-hub +
# spatial-service + geoserver + geonetwork on spatial.<domain>; cas + userdetails + apikey on
# auth.<domain>). docker_services_desc already clusters these via parentService/isSubService.
# A domain is SHARED when >1 of its cluster members is enabled; those services MUST use standard
# (fragment) nginx_vhost mode, NEVER fast_mode — fast_mode rewrites the whole .conf per role call,
# so only the last-registered service would survive. generate-compose derives
# nginx_vhost_fast_mode from this set, so no service needs a hand-set fast_mode:false.
- name: Compute shared-domain vhost service keys (parentService clusters with >1 enabled member)
  set_fact:
    nginx_shared_vhost_service_keys: >-
      {%- set members = {} -%}
      {%- for item in docker_services_desc | dict2items -%}
        {%- if item.key in services_enabled -%}
          {%- set dkey = item.value.parentService if (item.value.isSubService | default(false)) else item.key -%}
          {%- set _ = members.update({dkey: (members.get(dkey, []) + [item.key])}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set result = [] -%}
      {%- for dkey in members -%}
        {%- if members[dkey] | length > 1 -%}
          {%- for m in members[dkey] -%}
            {%- set _ = result.append(m) -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result | unique | list }}
  tags:
    - always
    - docker-compose
