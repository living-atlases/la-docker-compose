---
# Emit e2e-targets.json — the inventory-driven manifest of resolved public URLs per service,
# consumed by the e2e suite (Cypress) and scripts/verify-deployment.sh.
#
# URLs are built from the SAME *_base_url / *_context_path inventory vars that
# init-cas-admin.yml uses to register OIDC services, so they honour whatever the inventory
# dictates — a subdomain portal (records.l-a.site) or a path portal (portal/biocache-hub).
# Nothing here is hardcoded; a portal that routes by path just yields path URLs.
#
# Regenerable and idempotent (rendered content copy). Runs per host in the docker_compose
# group; the public URLs are the same on every host, so any host's file is authoritative.

- name: "e2e-targets: Assemble per-service public URLs from inventory vars"
  set_fact:
    # Each value = base_url ~ context_path, trailing slashes stripped so serviceUrl() joins
    # cleanly (only spatial carries context_path '/' in practice). Empty/relative entries are
    # filtered out in the next step, so a service not exposed here is simply absent.
    _e2e_raw:
      records: "{{ ((biocache_hub_base_url | default('')) ~ (biocache_hub_context_path | default(''))) | regex_replace('/+$', '') }}"
      recordsWs: "{{ ((biocache_service_base_url | default('')) ~ (biocache_service_context_path | default(''))) | regex_replace('/+$', '') }}"
      species: "{{ ((bie_hub_base_url | default('')) ~ (bie_hub_context_path | default(''))) | regex_replace('/+$', '') }}"
      speciesWs: "{{ ((bie_index_base_url | default('')) ~ (bie_index_context_path | default(''))) | regex_replace('/+$', '') }}"
      collections: "{{ ((collectory_base_url | default('')) ~ (collectory_context_path | default(''))) | regex_replace('/+$', '') }}"
      spatial: "{{ ((spatial_base_url | default(spatial_hub_base_url | default(''))) ~ (spatial_hub_context_path | default(''))) | regex_replace('/+$', '') }}"
      lists: "{{ ((lists_base_url | default('')) ~ (lists_context_path | default(''))) | regex_replace('/+$', '') }}"
      images: "{{ ((image_service_base_url | default('')) ~ (image_service_context_path | default(''))) | regex_replace('/+$', '') }}"
      logger: "{{ ((logger_base_url | default('')) ~ (logger_context_path | default(''))) | regex_replace('/+$', '') }}"
      regions: "{{ ((regions_base_url | default('')) ~ (regions_context_path | default(''))) | regex_replace('/+$', '') }}"
      # gatus_url is a bare hostname in the inventory (no scheme) — add https:// when missing.
      gatus: "{{ (('https://' ~ gatus_url) if (gatus_url is defined and gatus_url and not (gatus_url is match('^https?://'))) else (gatus_url | default(''))) | regex_replace('/+$', '') }}"
  tags:
    - docker-compose
    - e2e-targets

- name: "e2e-targets: Keep only services with an absolute URL (drop absent/relative)"
  set_fact:
    e2e_targets_services: >-
      {{ _e2e_raw | dict2items
         | selectattr('value', 'match', '^https?://')
         | list | items2dict }}
  tags:
    - docker-compose
    - e2e-targets

- name: "e2e-targets: Compose manifest"
  set_fact:
    e2e_targets_manifest:
      env: "{{ e2e_env_name | default('deployment') }}"
      root: "{{ (ala_base_url | default(default_logout_redirect_url | default(''))) | regex_replace('/+$', '') }}"
      auth: "{{ (cas_url | default('')) | regex_replace('/+$', '') }}"
      services: "{{ e2e_targets_services }}"
  tags:
    - docker-compose
    - e2e-targets

- name: "e2e-targets: Write {{ docker_compose_data_dir }}/e2e-targets.json"
  copy:
    content: "{{ e2e_targets_manifest | to_nice_json }}\n"
    dest: "{{ docker_compose_data_dir }}/e2e-targets.json"
    mode: "0644"
    owner: "{{ docker_compose_userid | default(omit) }}"
    group: "{{ docker_compose_usergid | default(omit) }}"
  become: true
  # Only write when we actually resolved public URLs (portal vars present on this host).
  when: e2e_targets_services | length > 0
  tags:
    - docker-compose
    - e2e-targets
