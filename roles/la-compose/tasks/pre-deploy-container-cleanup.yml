---
# Pre-deploy container cleanup — surgical, production-safe.
#
# Unhealthy la_* containers keep their health state even when stopped, so
# `docker compose up` sees them unhealthy immediately. A `docker restart`
# clears that state exactly like a remove+recreate does (health goes back to
# 'starting' and probes re-run), but PRESERVES the container and its ID — so a
# redeploy never destroys a container just because its healthcheck was flapping
# at that moment (e.g. the OIDC-route healthchecks of logger/data-quality going
# 500 while CAS warms up). CI #287: the old `rm -f` here recreated
# la_logger-service mid-redeploy and tripped the hot-redeploy container-ID
# assertion. If the restart doesn't cure it, the post-deploy converge rounds
# retry, and the health gate stays honest.
#
# la_nginx is NOT touched on the normal path: killing it takes the whole site
# down on every redeploy (it is the single entrypoint). Regenerated vhosts are
# applied with a graceful `nginx -s reload` after `compose up` (see main.yml).
# The removal only remains as an opt-in Docker Desktop workaround, whose
# port-forwarder holds :80/:443 bindings after stop (docker_desktop_workaround).

- name: "Pre-deploy: List unhealthy la_* containers"
  shell: docker ps -a --filter "health=unhealthy" --filter "name=la_" --format '{{ '{{' }}.Names{{ '}}' }}'
  register: unhealthy_containers
  become: true
  changed_when: false
  tags: [docker-compose, deploy]

- name: "Pre-deploy: Restart unhealthy la_* containers (resets health state, keeps container + ID)"
  shell: |
    docker ps -a --filter "health=unhealthy" --filter "name=la_" --format '{{ '{{' }}.Names{{ '}}' }}' \
      | xargs -r docker restart
  become: true
  register: unhealthy_restart
  failed_when: false
  changed_when: unhealthy_restart.rc == 0
  when: unhealthy_containers.stdout_lines | length > 0
  tags: [docker-compose, deploy]

- name: "Pre-deploy: Report restarted unhealthy containers"
  debug:
    msg: "Restarted unhealthy containers (health state reset, IDs preserved): {{ unhealthy_containers.stdout_lines | join(', ') }}"
  when: unhealthy_containers.stdout_lines | length > 0
  tags: [docker-compose, deploy]

- name: "Pre-deploy: Remove la_nginx (Docker Desktop port-binding workaround only)"
  command: docker rm -f la_nginx
  become: true
  register: nginx_removal
  failed_when: false
  changed_when: nginx_removal.rc == 0
  when: docker_desktop_workaround | default(false) | bool
  tags: [docker-compose, deploy]
