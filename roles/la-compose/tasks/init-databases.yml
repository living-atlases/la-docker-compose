---
# Database Initialization Tasks
# Called from main.yml before starting all Docker Compose services

- name: "DB Init: Load CAS variables for database configuration"
  include_vars:
    file: "{{ playbook_dir }}/../ala-install/ansible/roles/cas5/vars/main.yml"
  when: "'cas-servers' in physical_server_groups"
  tags:
    - db-init

- name: "DB Init: Start database containers only (MySQL and MongoDB)"
  command: docker compose up -d mysql mongodb
  args:
    chdir: "{{ docker_compose_data_dir }}"
  become: true
  tags:
    - db-init

- name: "DB Init: Wait for MySQL to be healthy"
  shell: |
    docker inspect --format='{{ "{{" }}.State.Health.Status{{ "}}" }}' la_mysql
  register: mysql_health
  until: 'mysql_health.stdout == "healthy"'
  retries: 30
  delay: 5
  become: true
  tags:
    - db-init

- name: "DB Init: Wait for MongoDB to be healthy"
  shell: |
    docker inspect --format='{{ "{{" }}.State.Health.Status{{ "}}" }}' la_mongodb
  register: mongodb_health
  until: 'mongodb_health.stdout == "healthy"'
  retries: 60
  delay: 6
  become: true
  tags:
    - db-init

- name: "DB Init: Verify MySQL is accepting connections (via docker exec)"
  command: >
    docker exec la_mysql mysqladmin ping -h localhost -u root -p{{ mysql_root_password }} --silent
  register: mysql_ping
  until: mysql_ping.rc == 0
  retries: 10
  delay: 3
  become: true
  changed_when: false
  tags:
    - db-init

- name: "DB Init: Verify MongoDB is accepting connections (via docker exec)"
  command: >
    docker exec la_mongodb mongosh --quiet --eval "db.adminCommand('ping').ok" --username {{ mongodb_root_username }} --password {{ mongodb_root_password }}
  register: mongo_ping
  until: mongo_ping.rc == 0
  retries: 40
  delay: 5
  become: true
  changed_when: false
  tags:
    - db-init

# The la_mongodb-data volume is `external` and pre-populated, so the mongo
# image never re-runs /docker-entrypoint-initdb.d. These CAS users would
# otherwise never exist -> la_cas stays unhealthy. Create/refresh them every
# deploy via docker exec (idempotent), mirroring roles/cas5-dbs user list.
- name: "DB Init: Create/refresh MongoDB CAS users (idempotent)"
  command:
    argv:
      - docker
      - exec
      - la_mongodb
      - mongosh
      - --quiet
      - --username
      - "{{ mongodb_root_username }}"
      - --password
      - "{{ mongodb_root_password }}"
      - --authenticationDatabase
      - admin
      - --eval
      - >-
        var created=0,updated=0;
        [{u:"{{ cas_tickets_username }}",
          p:"{{ cas_tickets_password }}",
          db:"{{ cas_tickets_db | default('cas-ticket-registry') }}"},
         {u:"{{ cas_services_username }}",
          p:"{{ cas_services_password }}",
          db:"{{ cas_services_db | default('cas-service-registry') }}"},
         {u:"{{ cas_audit_username | default('cas') }}",
          p:"{{ cas_audit_password | default('password') }}",
          db:"{{ cas_audit_db | default('cas-audit-repository') }}"},
         {u:"{{ cas_spring_session_username | default('cas') }}",
          p:"{{ cas_spring_session_password | default('password') }}",
          db:"{{ cas_spring_session_db | default('spring-sessions') }}"}
        ].forEach(function(x){
          var d=db.getSiblingDB(x.db);
          if(d.getUser(x.u)){d.updateUser(x.u,{pwd:x.p,roles:[{role:"readWrite",db:x.db}]});updated++;}
          else{d.createUser({user:x.u,pwd:x.p,roles:[{role:"readWrite",db:x.db}]});created++;}
        });
        if(created>0)print("MONGO_USERS_CHANGED");
        print("mongo-cas-users created="+created+" updated="+updated);
  become: true
  register: mongo_cas_users
  changed_when: "'MONGO_USERS_CHANGED' in mongo_cas_users.stdout"
  failed_when: mongo_cas_users.rc != 0
  when: "'cas-servers' in physical_server_groups"
  tags:
    - db-init

- name: "DB Init: Check if MySQL databases exist"
  command: >
    docker exec la_mysql mysql -N
    -u root -p{{ mysql_root_password }}
    -e "SELECT SCHEMA_NAME FROM information_schema.SCHEMATA
        WHERE SCHEMA_NAME IN ('{{ cas_db_name | default('emmet') }}',
                              '{{ apikey_db_name | default('apikey') }}');"
  register: mysql_databases_exist
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init

- name: "DB Init: Check if CAS MySQL users exist"
  command: >
    docker exec la_mysql mysql -N
    -u root -p{{ mysql_root_password }}
    -e "SELECT COUNT(*) FROM mysql.user
        WHERE User IN ('{{ cas_flyway_username | default('cas_flyway') }}',
                       '{{ cas_db_username | default('cas') }}',
                       '{{ apikey_db_username | default('apikey') }}');"
  register: mysql_users_exist
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init

- name: "DB Init: Determine if initialization is needed"
  set_fact:
    needs_db_init: >-
      {{
        mysql_databases_exist is failed
        or mysql_databases_exist.stdout_lines | length < 2
        or mysql_users_exist is failed
        or (mysql_users_exist.stdout | trim | int) < 3
        or force_db_init | default(false)
      }}
  tags:
    - db-init

- name: "DB Init: Create MySQL CAS databases via docker exec"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }}
    -e "CREATE DATABASE IF NOT EXISTS {{ cas_db_name | default('emmet') }} CHARACTER SET {{ cas_db_encoding | default('utf8mb4') }};
        CREATE DATABASE IF NOT EXISTS {{ apikey_db_name | default('apikey') }} CHARACTER SET {{ cas_db_encoding | default('utf8mb4') }};"
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
    - needs_db_init | default(false) | bool
  tags:
    - db-init

- name: "DB Init: Create MySQL CAS users and grants via docker exec"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -e "
    CREATE USER IF NOT EXISTS '{{ cas_flyway_username | default('cas_flyway') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_flyway_password }}';
    GRANT ALL PRIVILEGES ON {{ cas_db_name | default('emmet') }}.* TO '{{ cas_flyway_username | default('cas_flyway') }}'@'%';
    CREATE USER IF NOT EXISTS '{{ cas_db_username | default('cas') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_db_password }}';
    GRANT INSERT,SELECT,UPDATE,DELETE,EXECUTE,TRIGGER ON {{ cas_db_name | default('emmet') }}.* TO '{{ cas_db_username | default('cas') }}'@'%';
    CREATE USER IF NOT EXISTS '{{ apikey_db_username | default('apikey') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ apikey_db_password }}';
    GRANT ALL PRIVILEGES ON {{ apikey_db_name | default('apikey') }}.* TO '{{ apikey_db_username | default('apikey') }}'@'%';
    FLUSH PRIVILEGES;"
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
    - needs_db_init | default(false) | bool
  tags:
    - db-init

# Always re-sync passwords to the current inventory values. CREATE USER IF NOT
# EXISTS above is a no-op for users that already exist in the persisted MySQL
# volume — so after a password rotation, the user keeps the OLD password and
# CAS gets `Access denied for user 'flyway'@'...'`. ALTER USER IF EXISTS makes
# it safe to run even on a fresh MySQL where users don't exist yet.
- name: "DB Init: Sync MySQL CAS user passwords (idempotent — handles rotations)"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -e "
    ALTER USER IF EXISTS '{{ cas_flyway_username | default('cas_flyway') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_flyway_password }}';
    ALTER USER IF EXISTS '{{ cas_db_username | default('cas') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_db_password }}';
    ALTER USER IF EXISTS '{{ apikey_db_username | default('apikey') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ apikey_db_password }}';
    FLUSH PRIVILEGES;"
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
  changed_when: false
  tags:
    - db-init
    - db-password-sync

# Closes the race where docker compose up recreates la_cas before FLUSH
# PRIVILEGES finishes propagating, surfacing as a transient Hikari
# "Access denied for user 'flyway'@..." during CAS first connect.
- name: "DB Init: Verify cas_flyway can authenticate (closes FLUSH PRIVILEGES race)"
  command: >
    docker exec la_mysql mysql
    -u {{ cas_flyway_username | default('cas_flyway') }}
    -p{{ cas_flyway_password }}
    -e "SELECT 1;"
  register: cas_flyway_probe
  retries: 10
  delay: 2
  until: cas_flyway_probe.rc == 0
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
  changed_when: false
  no_log: true
  tags:
    - db-init
    - db-password-sync

- name: "DB Init: Verify database initialization completed successfully"
  include_tasks: validate-db-init.yml
  when: "'cas-servers' in physical_server_groups"
  tags:
    - db-init
    - db-validation

- name: "DB Init: Database initialization completed successfully"
  debug:
    msg: "✅ Database initialization completed. Ready to start all services."
  tags:
    - db-init
