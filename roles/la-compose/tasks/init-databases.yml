---
# Database Initialization Tasks
# Called from main.yml before starting all Docker Compose services

- name: "DB Init: Define logger SQL files to import (first-run schema/reference data)"
  set_fact:
    logger_db_sql_files:
      - schema.sql
      - eventLogType.sql
      - reasonLogType.sql
      - sourceLogType.sql
      - refresh_summary_breakdown_email.sql
      - refresh_summary_breakdown_reason.sql
      - refresh_summary_breakdown_source.sql
      - refresh_summary_totals.sql
      - update_breakdown_summary_information.sql
  tags:
    - db-init

- name: "DB Init: Load CAS variables for database configuration"
  include_vars:
    file: "{{ playbook_dir }}/../ala-install/ansible/roles/cas5/vars/main.yml"
  when: "'cas-servers' in physical_server_groups"
  tags:
    - db-init

# Multi-host: a host whose generated compose does NOT define mysql/mongodb (e.g. the
# Solr/image host 2023-2) would hit `docker compose up mysql mongodb -> no such
# service: mysql`, FAIL, and get dropped from the play *before* Solr/biocache ever
# deploy — cascading the whole multi-host build to red (Solr never starts there, so
# init-solr never creates the collections, so biocache/bie stay UNHEALTHY on every
# host). Gate every mysql/mongodb step on the service actually being present on this
# host (same idea as the postgres provisioning below, gated to image-service hosts).
- name: "DB Init: List services defined in this host's compose"
  command: docker compose config --services
  args:
    chdir: "{{ docker_compose_data_dir }}"
  register: db_compose_services
  changed_when: false
  become: true
  tags:
    - db-init

- name: "DB Init: Start MySQL container (only where defined)"
  command: docker compose up -d mysql
  args:
    chdir: "{{ docker_compose_data_dir }}"
  become: true
  when: "'mysql' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Start MongoDB container (only where defined)"
  command: docker compose up -d mongodb
  args:
    chdir: "{{ docker_compose_data_dir }}"
  become: true
  when: "'mongodb' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Wait for MySQL to be healthy"
  shell: |
    docker inspect --format='{{ "{{" }}.State.Health.Status{{ "}}" }}' la_mysql
  register: mysql_health
  until: 'mysql_health.stdout == "healthy"'
  retries: 30
  delay: 5
  become: true
  when: "'mysql' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Wait for MongoDB to be healthy"
  shell: |
    docker inspect --format='{{ "{{" }}.State.Health.Status{{ "}}" }}' la_mongodb
  register: mongodb_health
  until: 'mongodb_health.stdout == "healthy"'
  retries: 60
  delay: 6
  become: true
  when: "'mongodb' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Verify MySQL is accepting connections (via docker exec)"
  command: >
    docker exec la_mysql mysqladmin ping -h localhost -u root -p{{ mysql_root_password }} --silent
  register: mysql_ping
  until: mysql_ping.rc == 0
  retries: 10
  delay: 3
  become: true
  changed_when: false
  when: "'mysql' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Verify MongoDB is accepting connections (via docker exec)"
  command: >
    docker exec la_mongodb mongosh --quiet --eval "db.adminCommand('ping').ok" --username {{ mongodb_root_username }} --password {{ mongodb_root_password }}
  register: mongo_ping
  until: mongo_ping.rc == 0
  retries: 40
  delay: 5
  become: true
  changed_when: false
  when: "'mongodb' in db_compose_services.stdout_lines"
  tags:
    - db-init

# The la_mongodb-data volume is `external` and pre-populated, so the mongo
# image never re-runs /docker-entrypoint-initdb.d. These CAS users would
# otherwise never exist -> la_cas stays unhealthy. Create/refresh them every
# deploy via docker exec (idempotent), mirroring roles/cas5-dbs user list.
- name: "DB Init: Create/refresh MongoDB CAS users (idempotent)"
  command:
    argv:
      - docker
      - exec
      - la_mongodb
      - mongosh
      - --quiet
      - --username
      - "{{ mongodb_root_username }}"
      - --password
      - "{{ mongodb_root_password }}"
      - --authenticationDatabase
      - admin
      - --eval
      - >-
        var created=0,updated=0;
        [{u:"{{ cas_tickets_username }}",
          p:"{{ cas_tickets_password }}",
          db:"{{ cas_tickets_db | default('cas-ticket-registry') }}"},
         {u:"{{ cas_services_username }}",
          p:"{{ cas_services_password }}",
          db:"{{ cas_services_db | default('cas-service-registry') }}"},
         {u:"{{ cas_audit_username | default('cas') }}",
          p:"{{ cas_audit_password | default('password') }}",
          db:"{{ cas_audit_db | default('cas-audit-repository') }}"},
         {u:"{{ cas_spring_session_username | default('cas') }}",
          p:"{{ cas_spring_session_password | default('password') }}",
          db:"{{ cas_spring_session_db | default('spring-sessions') }}"}
        ].forEach(function(x){
          var d=db.getSiblingDB(x.db);
          if(d.getUser(x.u)){d.updateUser(x.u,{pwd:x.p,roles:[{role:"readWrite",db:x.db}]});updated++;}
          else{d.createUser({user:x.u,pwd:x.p,roles:[{role:"readWrite",db:x.db}]});created++;}
        });
        if(created>0)print("MONGO_USERS_CHANGED");
        print("mongo-cas-users created="+created+" updated="+updated);
  become: true
  register: mongo_cas_users
  changed_when: "'MONGO_USERS_CHANGED' in mongo_cas_users.stdout"
  failed_when: mongo_cas_users.rc != 0
  when: "'cas-servers' in physical_server_groups"
  tags:
    - db-init

- name: "DB Init: Check if MySQL databases exist"
  command: >
    docker exec la_mysql mysql -N
    -u root -p{{ mysql_root_password }}
    -e "SELECT SCHEMA_NAME FROM information_schema.SCHEMATA
        WHERE SCHEMA_NAME IN ('{{ cas_db_name | default('emmet') }}',
                              '{{ apikey_db_name | default('apikey') }}');"
  register: mysql_databases_exist
  become: true
  ignore_errors: true
  changed_when: false
  # Gate to hosts that actually run mysql (see header note): on a solr/zk-only host
  # there is no la_mysql container, so `docker exec la_mysql` errors and — even with
  # ignore_errors — leaves mysql_databases_exist unset, which then breaks the
  # needs_db_init fact below. beb746a gated start/health but missed these two checks.
  when: "'mysql' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Check if CAS MySQL users exist"
  command: >
    docker exec la_mysql mysql -N
    -u root -p{{ mysql_root_password }}
    -e "SELECT COUNT(*) FROM mysql.user
        WHERE User IN ('{{ cas_flyway_username | default('cas_flyway') }}',
                       '{{ cas_db_username | default('cas') }}',
                       '{{ apikey_db_username | default('apikey') }}');"
  register: mysql_users_exist
  become: true
  ignore_errors: true
  changed_when: false
  when: "'mysql' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Determine if initialization is needed"
  set_fact:
    needs_db_init: >-
      {{
        mysql_databases_exist is failed
        or mysql_databases_exist.stdout_lines | length < 2
        or mysql_users_exist is failed
        or (mysql_users_exist.stdout | trim | int) < 3
        or force_db_init | default(false)
      }}
  # Same mysql co-location gate as the two checks above: the expression dereferences
  # mysql_databases_exist/mysql_users_exist, which are only set on mysql hosts. The
  # downstream init tasks already guard with `needs_db_init | default(false)`.
  when: "'mysql' in db_compose_services.stdout_lines"
  tags:
    - db-init

- name: "DB Init: Create MySQL CAS databases via docker exec"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }}
    -e "CREATE DATABASE IF NOT EXISTS {{ cas_db_name | default('emmet') }} CHARACTER SET {{ cas_db_encoding | default('utf8mb4') }};
        CREATE DATABASE IF NOT EXISTS {{ apikey_db_name | default('apikey') }} CHARACTER SET {{ cas_db_encoding | default('utf8mb4') }};"
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
    - needs_db_init | default(false) | bool
  tags:
    - db-init

- name: "DB Init: Create MySQL CAS users and grants via docker exec"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -e "
    CREATE USER IF NOT EXISTS '{{ cas_flyway_username | default('cas_flyway') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_flyway_password }}';
    GRANT ALL PRIVILEGES ON {{ cas_db_name | default('emmet') }}.* TO '{{ cas_flyway_username | default('cas_flyway') }}'@'%';
    CREATE USER IF NOT EXISTS '{{ cas_db_username | default('cas') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_db_password }}';
    GRANT INSERT,SELECT,UPDATE,DELETE,EXECUTE,TRIGGER ON {{ cas_db_name | default('emmet') }}.* TO '{{ cas_db_username | default('cas') }}'@'%';
    CREATE USER IF NOT EXISTS '{{ apikey_db_username | default('apikey') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ apikey_db_password }}';
    GRANT ALL PRIVILEGES ON {{ apikey_db_name | default('apikey') }}.* TO '{{ apikey_db_username | default('apikey') }}'@'%';
    FLUSH PRIVILEGES;"
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
    - needs_db_init | default(false) | bool
  tags:
    - db-init

# Always re-sync passwords to the current inventory values. CREATE USER IF NOT
# EXISTS above is a no-op for users that already exist in the persisted MySQL
# volume — so after a password rotation, the user keeps the OLD password and
# CAS gets `Access denied for user 'flyway'@'...'`. ALTER USER IF EXISTS makes
# it safe to run even on a fresh MySQL where users don't exist yet.
- name: "DB Init: Sync MySQL CAS user passwords (idempotent — handles rotations)"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -e "
    ALTER USER IF EXISTS '{{ cas_flyway_username | default('cas_flyway') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_flyway_password }}';
    ALTER USER IF EXISTS '{{ cas_db_username | default('cas') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ cas_db_password }}';
    ALTER USER IF EXISTS '{{ apikey_db_username | default('apikey') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ apikey_db_password }}';
    FLUSH PRIVILEGES;"
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
  changed_when: false
  tags:
    - db-init
    - db-password-sync

# Closes the race where docker compose up recreates la_cas before FLUSH
# PRIVILEGES finishes propagating, surfacing as a transient Hikari
# "Access denied for user 'flyway'@..." during CAS first connect.
- name: "DB Init: Verify cas_flyway can authenticate (closes FLUSH PRIVILEGES race)"
  command: >
    docker exec la_mysql mysql
    -u {{ cas_flyway_username | default('cas_flyway') }}
    -p{{ cas_flyway_password }}
    -e "SELECT 1;"
  register: cas_flyway_probe
  retries: 10
  delay: 2
  until: cas_flyway_probe.rc == 0
  become: true
  when:
    - "'cas-servers' in physical_server_groups"
  changed_when: false
  no_log: true
  tags:
    - db-init
    - db-password-sync

# --- collectory MySQL user ---
# The mysql:8.0 image creates the user from MYSQL_USER/MYSQL_PASSWORD only on
# the *first* volume init. Once the volume exists, password rotations in the
# inventory are never propagated, and Grails dies with
# "Access denied for user 'collectory'@..." on every restart.
# CREATE IF NOT EXISTS + ALTER IF EXISTS makes this idempotent on both fresh
# and aged volumes (same pattern as the CAS block above).
- name: "DB Init: Create/sync collectory MySQL user and grants"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -e "
    CREATE DATABASE IF NOT EXISTS {{ collectory_db_name | default('collectory') }} CHARACTER SET utf8mb4;
    CREATE USER IF NOT EXISTS '{{ collectory_db_user | default('collectory') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ collectory_db_password }}';
    ALTER USER IF EXISTS '{{ collectory_db_user | default('collectory') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ collectory_db_password }}';
    GRANT ALL PRIVILEGES ON {{ collectory_db_name | default('collectory') }}.* TO '{{ collectory_db_user | default('collectory') }}'@'%';
    FLUSH PRIVILEGES;"
  become: true
  when: "'collectory' in physical_server_groups"
  changed_when: false
  tags:
    - db-init
    - db-password-sync

- name: "DB Init: Verify collectory MySQL user can authenticate (closes FLUSH PRIVILEGES race)"
  command: >
    docker exec la_mysql mysql
    -u {{ collectory_db_user | default('collectory') }}
    -p{{ collectory_db_password }}
    -e "SELECT 1;"
  register: collectory_db_probe
  retries: 10
  delay: 2
  until: collectory_db_probe.rc == 0
  become: true
  when: "'collectory' in physical_server_groups"
  changed_when: false
  no_log: true
  tags:
    - db-init
    - db-password-sync

# --- specieslists MySQL user ---
# Unlike collectory, the mysql image does not auto-create this user at all;
# init-databases never set it up either, so specieslist-webapp restart-loops
# from day one with "Access denied for user 'specieslists'@...".
- name: "DB Init: Create/sync specieslists MySQL user and grants"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -e "
    CREATE DATABASE IF NOT EXISTS {{ specieslist_db_name | default('specieslists') }} CHARACTER SET utf8mb4;
    CREATE USER IF NOT EXISTS '{{ specieslist_db_username | default('specieslists') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ specieslist_db_password }}';
    ALTER USER IF EXISTS '{{ specieslist_db_username | default('specieslists') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ specieslist_db_password }}';
    GRANT ALL PRIVILEGES ON {{ specieslist_db_name | default('specieslists') }}.* TO '{{ specieslist_db_username | default('specieslists') }}'@'%';
    FLUSH PRIVILEGES;"
  become: true
  when: "'species-list' in physical_server_groups"
  changed_when: false
  tags:
    - db-init
    - db-password-sync

- name: "DB Init: Verify specieslists MySQL user can authenticate (closes FLUSH PRIVILEGES race)"
  command: >
    docker exec la_mysql mysql
    -u {{ specieslist_db_username | default('specieslists') }}
    -p{{ specieslist_db_password }}
    -e "SELECT 1;"
  register: specieslists_db_probe
  retries: 10
  delay: 2
  until: specieslists_db_probe.rc == 0
  become: true
  when: "'species-list' in physical_server_groups"
  changed_when: false
  no_log: true
  tags:
    - db-init
    - db-password-sync

# --- logger-service MySQL user ---
# Same gap as specieslists: the mysql image never auto-creates this user, and
# init-databases never provisioned it, so logger-service restart-loops with
# "Access denied for user 'logger_user'@...". Provision idempotently.
- name: "DB Init: Create/sync logger MySQL user and grants"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -e "
    CREATE DATABASE IF NOT EXISTS {{ logger_db_name | default('logger') }} CHARACTER SET utf8mb4;
    CREATE USER IF NOT EXISTS '{{ logger_db_username | default('logger_user') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ logger_db_password }}';
    ALTER USER IF EXISTS '{{ logger_db_username | default('logger_user') }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ logger_db_password }}';
    GRANT ALL PRIVILEGES ON {{ logger_db_name | default('logger') }}.* TO '{{ logger_db_username | default('logger_user') }}'@'%';
    FLUSH PRIVILEGES;"
  become: true
  when: "'logger-service' in physical_server_groups"
  changed_when: false
  tags:
    - db-init
    - db-password-sync

- name: "DB Init: Verify logger MySQL user can authenticate (closes FLUSH PRIVILEGES race)"
  command: >
    docker exec la_mysql mysql
    -u {{ logger_db_username | default('logger_user') }}
    -p{{ logger_db_password }}
    -e "SELECT 1;"
  register: logger_db_probe
  retries: 10
  delay: 2
  until: logger_db_probe.rc == 0
  become: true
  when: "'logger-service' in physical_server_groups"
  changed_when: false
  no_log: true
  tags:
    - db-init
    - db-password-sync

# The logger app's Liquibase changeset 1 only does CREATE INDEX on log_event;
# it assumes the base schema already exists (the VM role imports schema.sql).
# In docker-local that import never ran, so Liquibase dies with
# "Table 'logger.log_event' doesn't exist". Import schema + reference data once,
# guarded on log_event absence so re-runs don't DROP/recreate (data loss).
- name: "DB Init: Check whether logger schema is already loaded"
  command: >
    docker exec la_mysql mysql -u root -p{{ mysql_root_password }} -N -e
    "SELECT COUNT(*) FROM information_schema.tables
     WHERE table_schema='{{ logger_db_name | default('logger') }}' AND table_name='log_event';"
  register: logger_schema_check
  become: true
  when: "'logger-service' in physical_server_groups"
  changed_when: false
  no_log: true
  tags:
    - db-init

# The docker exec `< file` redirect is interpreted by the shell on the *target*
# host, not on the Ansible controller. {{ playbook_dir }} is a controller-side
# path that does not exist on remote managed nodes, so we must first push the
# SQL files to the target with `copy` (mirrors the upstream VM logger-service
# role), then import from the now-local /tmp path.
- name: "DB Init: Stage logger SQL files on target host (first run only)"
  copy:
    src: "{{ playbook_dir }}/../ala-install/ansible/roles/logger-service/files/db/{{ item }}"
    dest: "/tmp/logger-{{ item }}"
  loop: "{{ logger_db_sql_files }}"
  become: true
  when:
    - "'logger-service' in physical_server_groups"
    - (logger_schema_check.stdout | default('1') | trim) == '0'
  tags:
    - db-init

- name: "DB Init: Import logger schema, stored procs and reference data (first run only)"
  shell: >
    docker exec -i la_mysql mysql -u root -p{{ mysql_root_password }}
    {{ logger_db_name | default('logger') }}
    < "/tmp/logger-{{ item }}"
  loop: "{{ logger_db_sql_files }}"
  become: true
  when:
    - "'logger-service' in physical_server_groups"
    - (logger_schema_check.stdout | default('1') | trim) == '0'
  changed_when: true
  tags:
    - db-init

# --- image-service PostgreSQL database + login role ---
# postgres:16 only honours POSTGRES_DB/POSTGRES_USER on the *first* volume init,
# so image-service's `images` DB + role never exist on an aged volume and Flyway
# dies with "password authentication failed for user images". Provision both
# idempotently. PG15+ locks down the public schema (owned by pg_database_owner),
# so the role must OWN the database to be able to create its schema/tables.
- name: "DB Init: Start postgres container (for image-service provisioning)"
  command: docker compose up -d postgres
  args:
    chdir: "{{ docker_compose_data_dir }}"
  become: true
  when: "'image-service' in physical_server_groups"
  tags:
    - db-init

- name: "DB Init: Wait for postgres to be healthy"
  shell: |
    docker inspect --format='{{ "{{" }}.State.Health.Status{{ "}}" }}' la_postgres
  register: postgres_health
  until: 'postgres_health.stdout == "healthy"'
  retries: 30
  delay: 5
  become: true
  when: "'image-service' in physical_server_groups"
  tags:
    - db-init

- name: "DB Init: Create/sync image-service postgres login role (idempotent)"
  command: >
    docker exec -u postgres la_postgres psql -v ON_ERROR_STOP=1 -c
    "DO $$ BEGIN
       IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='{{ image_service_db_username | default('images') }}') THEN
         CREATE ROLE {{ image_service_db_username | default('images') }} LOGIN PASSWORD '{{ image_service_db_password }}';
       END IF;
     END $$;
     ALTER ROLE {{ image_service_db_username | default('images') }} WITH LOGIN PASSWORD '{{ image_service_db_password }}';"
  become: true
  when: "'image-service' in physical_server_groups"
  changed_when: false
  no_log: true
  tags:
    - db-init
    - db-password-sync

- name: "DB Init: Check if image-service postgres database exists"
  command: >
    docker exec -u postgres la_postgres psql -tAc
    "SELECT 1 FROM pg_database WHERE datname='{{ image_service_db_name | default('images') }}'"
  register: image_db_exists
  become: true
  changed_when: false
  when: "'image-service' in physical_server_groups"
  tags:
    - db-init

- name: "DB Init: Create image-service postgres database owned by its role"
  command: >
    docker exec -u postgres la_postgres psql -v ON_ERROR_STOP=1 -c
    "CREATE DATABASE {{ image_service_db_name | default('images') }}
     OWNER {{ image_service_db_username | default('images') }}"
  become: true
  when:
    - "'image-service' in physical_server_groups"
    - (image_db_exists.stdout | default('') | trim) != "1"
  tags:
    - db-init

- name: "DB Init: Verify image-service postgres user can authenticate (closes provisioning race)"
  command: >
    docker exec -e PGPASSWORD={{ image_service_db_password }} la_postgres
    psql -h localhost -U {{ image_service_db_username | default('images') }}
    -d {{ image_service_db_name | default('images') }} -tAc "SELECT 1;"
  register: image_db_probe
  retries: 10
  delay: 2
  until: image_db_probe.rc == 0
  become: true
  changed_when: false
  no_log: true
  when: "'image-service' in physical_server_groups"
  tags:
    - db-init
    - db-password-sync

- name: "DB Init: Verify database initialization completed successfully"
  include_tasks: validate-db-init.yml
  when: "'cas-servers' in physical_server_groups"
  tags:
    - db-init
    - db-validation

- name: "DB Init: Database initialization completed successfully"
  debug:
    msg: "✅ Database initialization completed. Ready to start all services."
  tags:
    - db-init
