---
# Docker Compose Role - Main Tasks
# Orchestrates docker-compose generation and deployment for Living Atlas

- name: Set container user UID/GID for file ownership
  set_fact:
    docker_compose_userid: "{{ docker_container_uid }}"
    docker_compose_usergid: "{{ docker_container_gid }}"
  tags:
    - always
    - only
    - docker-compose
  become: false

- name: Generate and Deploy Docker Compose
  when: "inventory_hostname in groups['docker_compose']"
  # Make every `docker compose` invocation in this block (and its included task
  # files: generate-compose, init-databases, validate-post-deploy) load the
  # generated .env AND the operator's persistent .env-custom. Last file wins on
  # key collisions, so .env-custom overrides .env. This is what makes operator
  # overrides take effect on Ansible-driven deploys, not only on manual runs.
  # Requires Docker Compose >= v2.24.
  environment:
    # Absolute paths (not bare '.env,.env-custom'): docker compose resolves relative
    # COMPOSE_ENV_FILES against the CWD, and not every `docker compose` invocation in this
    # block chdir's into docker_compose_data_dir — notably `config -q` in validate-pre-deploy,
    # which ran from the remote user's home and failed with "couldn't find env file:
    # /home/ubuntu/.env" (CI #229), aborting the whole deploy. Absolute paths work regardless
    # of CWD. The `up -d`/`down` commands chdir anyway, so they're unaffected either way.
    COMPOSE_ENV_FILES: "{{ compose_env_files | default(docker_compose_data_dir ~ '/.env,' ~ docker_compose_data_dir ~ '/.env-custom') }}"
  block:
    - name: Ensure Docker is installed
      import_role:
        name: docker
      when: auto_deploy | default(true) | bool
      tags:
        - docker

    - name: Ensure docker_compose_data_dir exists early
      file:
        path: "{{ docker_compose_data_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ docker_compose_userid }}"
        group: "{{ docker_compose_usergid }}"
      become: true
      tags:
        - always
        - docker-compose
        - build

    - name: Create dockerfiles subdirectory in output
      file:
        path: "{{ docker_compose_data_dir }}/dockerfiles"
        state: directory
        mode: "0755"
        owner: "{{ docker_compose_userid }}"
        group: "{{ docker_compose_usergid }}"
      become: true
      tags:
        - always
        - only
        - docker-compose
        - build

    - name: Copy static docker files to output (builders)
      copy:
        src: "docker/"
        dest: "{{ docker_compose_data_dir }}/dockerfiles/"
        mode: preserve
        owner: "{{ docker_compose_userid }}"
        group: "{{ docker_compose_usergid }}"
      become: true
      tags:
        - always
        - only
        - docker-compose
        - build

    - name: "Deployment preparation: Ensure log directories"
      file:
        path: "{{ data_dir }}/logs"
        state: directory
        mode: "0755"
        owner: "{{ docker_compose_userid }}"
        group: "{{ docker_compose_usergid }}"
      tags:
        - always
        - docker-compose

    - name: "Deployment preparation: Setup deployment facts"
      include_tasks: setup-facts.yml
      tags:
        - always
        - docker-compose

    - name: Load variables from collectory role if present on this server
      include_vars:
        file: "{{ playbook_dir }}/../ala-install/ansible/roles/collectory/vars/main.yml"
      when: "'collectory' in physical_server_groups"
      tags:
        - always

    - name: Load variables from cas group role if present on this server
      include_vars:
        file: "{{ playbook_dir }}/../ala-install/ansible/roles/cas5/vars/main.yml"
      when: "'cas-servers' in physical_server_groups"
      tags:
        - always

    - name: Calculate collectory_app based on version
      set_fact:
        collectory_app: "{{ 'collectory' if collectory_version | default('3') is version('3', '>=') else 'ala-collectory' }}"
      when: "'collectory' in physical_server_groups"
      tags:
        - always

    - name: "Deployment preparation: Ensure database volumes exist (external)"
      include_role:
        name: la-volumes
      tags:
        - always
        - docker-volumes

    - name: Include generate-compose tasks
      include_tasks: generate-compose.yml
      tags:
        - always
        - only
        - docker-compose

    # The biocache-service role (ala-install) sets `mode: 644` unquoted, which
    # Ansible parses as decimal → octal 1204 (--w----r-T). On VMs the JVM runs
    # as a non-root user and reads via "others" perms; in docker the JVM runs
    # as root and only has --w- (write-only), so log4j.xml init fails.
    # Must run AFTER generate-compose (which invokes biocache3-service and
    # re-introduces the bad perms) — placing it before would let the role's
    # copy override the chmod. Docker-only path; ala-install untouched.
    - name: Fix biocache-service config perms (works around ala-install role bug)
      file:
        path: "{{ data_dir }}/biocache/config/{{ item }}"
        mode: "0644"
      loop:
        - log4j.xml
        - applicationContext.xml
        - download-csdm-email.html
        - download-doi-email.html
        - download-doi-readme.html
        - download-email.html
        - download-readme.html
        - facets.json
        - pipelines-field-config.json
      # Gate to the host that runs biocache-service. Elsewhere /data/biocache/config
      # does not exist, so `file: mode=` (state:file) fails on the absent path and
      # DROPS 2023-2/2023-3 from the play BEFORE the deploy stage -> cassandra (2023-3)
      # and image-service (2023-2) never start, and biocache-service then can't reach
      # Cassandra (build #187). Same un-co-located gate class as the service includes.
      when: "'biocache_service' in services_enabled"
      become: true
      tags:
        - docker-compose

    # Container-mode config provisioning. The upstream ALA roles (biocache-hub,
    # logger-service, ...) only create /data/<svc>/config and chown it on their VM
    # code paths (when: exec_jar / not exec_jar) and copy config files without an
    # owner. In container mode the JVM runs as uid/gid 1000, so on a clean host
    # either the dir is missing (ala-hub: "Config data location '/data/ala-hub/
    # config/' does not exist") or the files are root-owned (logger:
    # "logback.xml (Permission denied)"). Single-host hides it because /data is
    # pre-populated from prior runs. Ensure the config trees exist and are owned by
    # the container uid on the host that actually runs the container (gated per-host
    # via services_enabled). recurse:true both creates the dir and fixes root-owned
    # files copied by the upstream role. Idempotent; ala-install untouched.
    - name: "Ensure container-mode service config dirs exist and are owned by container uid"
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ docker_container_uid }}"
        group: "{{ docker_container_gid }}"
        recurse: true
      become: true
      loop:
        - { svc: 'cas',                  path: "{{ data_dir }}/cas/config" }
        - { svc: 'userdetails',          path: "{{ data_dir }}/userdetails/config" }
        - { svc: 'apikey',               path: "{{ data_dir }}/apikey/config" }
        - { svc: 'cas_management',       path: "{{ data_dir }}/cas-management/config" }
        - { svc: 'collectory',           path: "{{ collectory_data_dir | default(data_dir + '/collectory') }}/config" }
        - { svc: 'species_lists',        path: "{{ data_dir }}/specieslist-webapp/config" }
        # Literal ala-bie-hub (NOT the bie_hub var): the inventory sets bie_hub=ala-bie
        # for this play scope, but the bie-hub role copies config to and the container
        # mounts/reads /data/ala-bie-hub/config. languages.json/charts.json land there
        # root:root 0640 (role copies them after its own chown), so without chowning the
        # REAL dir the container (uid 1000) gets FileNotFoundException (Permission denied).
        - { svc: 'ala_bie',              path: "{{ data_dir }}/ala-bie-hub/config" }
        - { svc: 'bie_index',            path: "{{ data_dir }}/bie-index/config" }
        - { svc: 'ala_hub',              path: "{{ data_dir }}/{{ biocache_hub | default('ala-hub') }}/config" }
        - { svc: 'biocache_service',     path: "{{ data_dir }}/biocache/config" }
        - { svc: 'logger',               path: "{{ data_dir }}/logger/config" }
        - { svc: 'images',               path: "{{ data_dir }}/image-service/config" }
        - { svc: 'namematchingService',  path: "{{ data_dir }}/ala-namematching-server/config" }
        - { svc: 'sensitiveDataService', path: "{{ data_dir }}/ala-sensitive-data-server/config" }
        - { svc: 'alerts',               path: "{{ data_dir }}/alerts/config" }
        - { svc: 'regions',              path: "{{ data_dir }}/regions/config" }
        - { svc: 'doi',                  path: "{{ data_dir }}/doi-service/config" }
        - { svc: 'dataQuality',          path: "{{ data_dir }}/data-quality-filter-service/config" }
        # Future services — no-ops until added to generate-compose.yml
        - { svc: 'spatial',              path: "{{ data_dir }}/spatial-hub/config" }
        - { svc: 'spatial_service',      path: "{{ data_dir }}/spatial-service/config" }
        # geoserver shares geoserver_data_dir + spatial-data with spatial-service (uid 1000 writes
        # layer files there); chown so the ALA app can write. kartoza geoserver runs as root.
        - { svc: 'geoserver',            path: "{{ data_dir }}/geoserver_data_dir" }
        - { svc: 'geoserver',            path: "{{ data_dir }}/spatial-data" }
        # geonetwork catalogue data dir (the postgres image runs as root, chown is harmless).
        - { svc: 'geonetwork',           path: "{{ data_dir }}/geonetwork" }
        # ecodata/biocollect — inert until use_*=true populates their groups (no-op meanwhile).
        - { svc: 'ecodata',              path: "{{ data_dir }}/ecodata/config" }
        - { svc: 'biocollect',           path: "{{ data_dir }}/biocollect/config" }
        # pdfgen (self-hosted PDF backend for biocollect): livingatlases image runs as uid 1000.
        - { svc: 'pdfgen',               path: "{{ data_dir }}/pdfgen/config" }
        - { svc: 'pdfgen',               path: "{{ data_dir }}/pdfgen/storage" }
        - { svc: 'sds',                  path: "{{ data_dir }}/sds/config" }
      when: item.svc in services_enabled
      loop_control:
        label: "{{ item.path }}"
      tags:
        - docker-compose

    # Per-service persistent overrides for Spring Boot services. These containers
    # start with `-Dspring.config.name=application,application-local-config,...` and
    # `-Dspring.config.additional-location=/data/<svc>/config/`, so a local
    # `application-local-config.yml` is loaded AFTER (and overrides) the generated
    # config. We seed an explanatory placeholder ONCE (force: no) so the capability
    # is discoverable and the operator's edits survive every run. Grails services
    # (collectory, biocache-hub, bie-hub, bie-index, species-list) have no analogous
    # second-level external-config hook — see docs/configuration.md.
    - name: "Seed application-local-config.yml placeholder for Spring services (once, never overwritten)"
      template:
        src: application-local-config.yml.j2
        dest: "{{ item.path }}/application-local-config.yml"
        force: no
        owner: "{{ docker_container_uid }}"
        group: "{{ docker_container_gid }}"
        mode: '0644'
      become: true
      loop:
        - { svc: 'logger',          path: "{{ data_dir }}/logger/config" }
        - { svc: 'alerts',          path: "{{ data_dir }}/alerts/config" }
        - { svc: 'images',          path: "{{ data_dir }}/image-service/config" }
        - { svc: 'doi',             path: "{{ data_dir }}/doi-service/config" }
        - { svc: 'regions',         path: "{{ data_dir }}/regions/config" }
        - { svc: 'dataQuality',     path: "{{ data_dir }}/data-quality-filter-service/config" }
        - { svc: 'spatial_service', path: "{{ data_dir }}/spatial-service/config" }
        - { svc: 'spatial',         path: "{{ data_dir }}/spatial-hub/config" }
        - { svc: 'ecodata',         path: "{{ data_dir }}/ecodata/config" }
        - { svc: 'biocollect',      path: "{{ data_dir }}/biocollect/config" }
      when: item.svc in services_enabled
      loop_control:
        label: "{{ item.path }}"
      tags:
        - docker-compose

    # spatial-hub / spatial-service run 3.x Spring Boot images that use Logback, but the
    # ala-install roles only ship a legacy log4j.properties; Logback aborts boot on a non-.xml
    # logging.config ("Unexpected filename extension") — the crash-loop reason. Ship a minimal
    # Logback xml into their config dirs; the compose command override points -Dlogging.config at
    # it (see spatial-{hub,service}.yml.j2). doi-service has an equivalent logback.xml from its own
    # ala-install role, so it is not in this list. Idempotent; ala-install untouched.
    - name: "Deploy spatial Logback config (spatial-hub / spatial-service)"
      template:
        src: docker-compose/spatial-logback.xml
        dest: "{{ item.path }}/spatial-logback.xml"
        owner: "{{ docker_container_uid }}"
        group: "{{ docker_container_gid }}"
        mode: '0644'
      become: true
      loop:
        - { svc: 'spatial',         path: "{{ data_dir }}/spatial-hub/config" }
        - { svc: 'spatial_service', path: "{{ data_dir }}/spatial-service/config" }
      when: item.svc in services_enabled
      loop_control:
        label: "{{ item.path }}"
      tags:
        - docker-compose

    - name: "LAYER 2: Pre-deployment validation"
      include_tasks: validate-pre-deploy.yml
      when: auto_deploy | default(true) | bool
      tags:
        - always
        - docker-compose
        - validate
        - pre-deploy
      register: pre_deploy_result

    - name: Clean up existing containers and networks before redeployment
      block:
        - name: Remove Docker Compose state metadata files
          command: find "{{ docker_compose_data_dir }}" -maxdepth 1 -name ".docker-compose*.yml" -delete
          become: true
          changed_when: false
          ignore_errors: true

        # Destructive full teardown only on explicit force-recreate. The normal
        # path relies on `docker compose up -d` idempotency: healthy services
        # (nginx, gatus, ...) are left running and only changed services are
        # recreated, so host ports 80/443 are never freed-and-rebound (which on
        # Docker Desktop causes "address already in use" on the nginx rebind).
        - name: Stop and remove existing docker compose deployment (force-recreate only)
          command: docker compose down --remove-orphans
          args:
            chdir: "{{ docker_compose_data_dir }}"
          become: true
          register: compose_down_result
          failed_when:
            - compose_down_result.rc != 0
            - "'No such file or directory' not in compose_down_result.stderr"
            - "'No such container' not in compose_down_result.stderr"
          changed_when: false
          when: docker_force_recreate | default(false) | bool

      when:
        - auto_deploy | default(true) | bool
      tags:
        - docker-compose
        - deploy

    - name: Initialize databases (if CAS server or image-service on this host)
      include_tasks: init-databases.yml
      when:
        - auto_deploy | default(true) | bool
        - "'cas-servers' in physical_server_groups or 'image-service' in physical_server_groups"
      tags:
        - docker-compose
        - deploy
        - db-init

    # Containers that are unhealthy preserve that state even when stopped, so
    # `docker compose up` sees them as unhealthy immediately and fails. Remove all
    # la_* containers in unhealthy state before up so compose recreates them fresh.
    # Also removes la_nginx explicitly to release :80/:443 (Docker Desktop port-forwarder
    # holds bindings after stop).
    - name: "Pre-deploy: Remove unhealthy la_* containers and nginx (reset health state)"
      shell: |
        docker rm -f la_nginx 2>/dev/null || true
        docker ps -a --filter "health=unhealthy" --filter "name=la_" --format "{{ '{{' }}.Names{{ '}}' }}" | xargs -r docker rm -f
      become: true
      register: nginx_stop
      failed_when: false
      changed_when: nginx_stop.rc == 0
      when: auto_deploy | default(true) | bool
      tags:
        - docker-compose
        - deploy

    # block/rescue: on `docker compose up` failure, capture root-cause diagnostics
    # to /tmp/la-docker-deploy-failure.log + /tmp/la-docker-deploy-failure.root.log
    # so the watch / human gets the actual error line, not just rc=1. The plain
    # `command:` fails silently — without this, every loop ends with no captured
    # log and patches a downstream symptom instead of the real cause.
    - name: "Start Docker Compose services (with failure diagnostics)"
      when:
        - auto_deploy | default(true) | bool
      tags:
        - docker-compose
        - deploy
      block:
        - name: Start Docker Compose services
          command: >
            docker compose up -d --remove-orphans
            {{ '--force-recreate' if docker_force_recreate | default(false) | bool else '' }}
          args:
            chdir: "{{ docker_compose_data_dir }}"
          become: true

      rescue:
        - name: "Deploy failure: capture container diagnostics to /tmp/la-docker-deploy-failure.log"
          shell: |
            set +e
            FULL=/tmp/la-docker-deploy-failure.log
            ROOT=/tmp/la-docker-deploy-failure.root.log
            : > "$FULL"
            : > "$ROOT"
            {
              echo "==== Docker Compose deploy FAILED at $(date -Iseconds) ===="
              echo
              echo "==== docker compose ps -a ===="
              docker compose ps -a 2>&1
              echo
              echo "==== docker ps -a (la_*) ===="
              docker ps -a --filter "name=la_" --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.State{{ '}}' }}" 2>&1
            } >> "$FULL"

            # Determine non-healthy / non-running containers
            NON_HEALTHY=$(docker ps -a --filter "name=la_" \
              --format "{{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}" \
              | awk -F'\t' '$2 !~ /Up .*\(healthy\)/ && $2 !~ /Exited \(0\)/ {print $1}')

            for c in $NON_HEALTHY; do
              {
                echo
                echo "---- $c ----"
                echo "State: $(docker inspect --format '{{ '{{' }}.State.Status{{ '}}' }} exit={{ '{{' }}.State.ExitCode{{ '}}' }} health={{ '{{' }}if .State.Health{{ '}}' }}{{ '{{' }}.State.Health.Status{{ '}}' }}{{ '{{' }}else{{ '}}' }}none{{ '{{' }}end{{ '}}' }}' "$c" 2>/dev/null)"
                # Healthcheck probe output (e.g. `nginx -t` failures) lives here, NOT in docker logs
                echo "-- healthcheck probe output (last attempts) --"
                docker inspect --format '{{ '{{' }}if .State.Health{{ '}}' }}{{ '{{' }}range .State.Health.Log{{ '}}' }}{{ '{{' }}.Output{{ '}}' }}{{ '{{' }}end{{ '}}' }}{{ '{{' }}else{{ '}}' }}(no healthcheck defined){{ '{{' }}end{{ '}}' }}' "$c" 2>/dev/null
                echo "-- last 100 log lines --"
                docker logs --tail 100 "$c" 2>&1
              } >> "$FULL"
            done

            # Extract root-cause candidates into the short ROOT log
            {
              echo "Root-cause candidates per non-healthy container:"
              echo "  (full log: /tmp/la-docker-deploy-failure.log)"
              echo
              # Scan both docker logs (Java/app errors) AND the healthcheck probe output
              # (nginx -t / curl failures surface only in .State.Health.Log, never in logs).
              # NOTE: do NOT match a bare `nginx:` — it also matches benign `nginx: [warn]`
              # lines and grep -m1 would mask the real `[emerg]` fatal behind a warning.
              RC_PATTERN='Caused by:|FATAL|Public Key Retrieval|UnableToConnect|Connection refused|ERROR \[|panic:|level=fatal|host not found in upstream|cannot load certificate|\[emerg\]|\[error\]|\[crit\]|bind\(\) to|no such file or directory'
              for c in $NON_HEALTHY; do
                HC=$(docker inspect --format '{{ '{{' }}if .State.Health{{ '}}' }}{{ '{{' }}range .State.Health.Log{{ '}}' }}{{ '{{' }}.Output{{ '}}' }}{{ '{{' }}end{{ '}}' }}{{ '{{' }}end{{ '}}' }}' "$c" 2>/dev/null)
                FIRST=$( { docker logs "$c" 2>&1; echo "$HC"; } \
                  | grep -m1 -E "$RC_PATTERN")
                [ -n "$FIRST" ] && echo "[$c] $FIRST"
              done
            } > "$ROOT"

            cat "$ROOT"
            # Surface the full diagnostic to the Ansible/Jenkins console: the file lives on
            # the remote host and was previously invisible to CI. Bounded tail keeps it readable.
            echo
            echo "==== tail -n 200 of full diagnostic ($FULL) ===="
            tail -n 200 "$FULL"
          args:
            chdir: "{{ docker_compose_data_dir }}"
            executable: /bin/bash
          become: true
          changed_when: false
          failed_when: false
          register: deploy_failure_diag

        - name: "Deploy failure: print captured root-cause to ansible output"
          debug:
            msg: |
              ===== DEPLOY FAILED =====
              Full diagnostic: /tmp/la-docker-deploy-failure.log
              Root-cause candidates:
              {{ deploy_failure_diag.stdout | default('(no diagnostic captured)') }}

        - name: "Deploy failure: re-raise with pointer to log"
          fail:
            msg: |
              docker compose up failed. See /tmp/la-docker-deploy-failure.log for full diagnostic.
              First root-cause line(s):
              {{ deploy_failure_diag.stdout | default('(no root-cause line matched — read full log)') }}

    - name: "Solr: Initialize collections (idempotent: LIST then CREATE if missing)"
      include_tasks: init-solr.yml
      when:
        - auto_deploy | default(true) | bool
      tags:
        - docker-compose
        - deploy
        - solr-init

    - name: "CAS: Initialize admin account and OIDC services"
      include_tasks: init-cas-admin.yml
      when:
        - auto_deploy | default(true) | bool
        - "'cas-servers' in hostvars[inventory_hostname].service_aliases"
      tags:
        - docker-compose
        - deploy
        - cas-admin

    - name: "Geoserver: Initialize ALA workspace, LayersDB datastore, styles, feature types"
      include_tasks: init-geoserver.yml
      when:
        - auto_deploy | default(true) | bool
        - "'geoserver' in services_enabled"
      tags:
        - docker-compose
        - deploy
        - geoserver-init

    - name: "LAYER 3 & 4: Post-deployment validation and health check"
      include_tasks: validate-post-deploy.yml
      when: auto_deploy | default(true) | bool
      tags:
        - always
        - docker-compose
        - validate
        - post-deploy
      register: post_deploy_result

    # Cross-host datastore port reachability (firewall sanity). On a healthy deploy
    # this prints an OPEN/BLOCKED matrix for every remote datastore this host
    # consumes; on a blocked port it is the clearest single signal of "services are
    # up but cannot talk" (the #195/#196 ufw block). Report-only by default; the same
    # check also runs inside validate-post-deploy's rescue so a FAILED build surfaces
    # the blocked port as the root cause. Run standalone with --tags cross-host-ports.
    - name: "LAYER 4b: Cross-host datastore port reachability (firewall sanity)"
      include_tasks: validate-cross-host-ports.yml
      when: auto_deploy | default(true) | bool
      tags:
        - always
        - docker-compose
        - validate
        - post-deploy
        - cross-host-ports
