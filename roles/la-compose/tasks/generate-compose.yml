---
# Generate docker-compose.yml from templates
# Using existing ala-install variables

- name: Ensure docker_compose_data_dir is set
  set_fact:
    docker_compose_data_dir: "{{ docker_compose_data_dir | default('/data/docker-compose') }}"
  tags:
    - always
    - only
    - docker-compose
    - build

- name: Ensure nginx_docker_internal_aliases is a list
  set_fact:
    nginx_docker_internal_aliases: "{{ nginx_docker_internal_aliases | from_json if nginx_docker_internal_aliases is string else nginx_docker_internal_aliases }}"
  tags:
    - always
    - docker-compose

- name: Ensure docker_extra_hosts is a list
  set_fact:
    docker_extra_hosts: "{{ docker_extra_hosts | from_json if docker_extra_hosts is string else docker_extra_hosts }}"
  tags:
    - always
    - docker-compose

- name: Create docker_extra_hosts_dict mapping
  set_fact:
    docker_extra_hosts_dict: >-
      {%- set result = {} -%}
      {%- for entry in docker_extra_hosts -%}
        {%- set parts = entry.split(':', 1) -%}
        {%- if parts | length == 2 -%}
          {%- set _ = result.update({parts[0]: parts[1]}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  tags:
    - always
    - docker-compose

- name: Set docker facts for all services
  set_fact:
    # Core user variables for all services
    tomcat_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
    nginx_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
  tags:
    - always
    - docker-compose

- name: Set docker facts for cas services
  set_fact:
    cas_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
    collectory_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
    userdetails_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
    apikey_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
    cas_add_mongo_users: "{{ cas_add_mongo_users | default(true) }}"
  tags:
    - always
    - docker-compose 
  when: service_aliases.get('cas-servers') is defined

- name: Set docker facts for namematching service
  set_fact:
    namematching_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
  tags:
    - always
    - docker-compose    
  when: service_aliases.get('namematching-service') is defined

- name: Set docker facts for sensitive data service
  set_fact:
    sensitive_data_user: "{{ docker_compose_userid | default(ansible_env.SUDO_USER) | default(docker_compose_userid) }}"
  tags:
    - always
    - docker-compose
  when: service_aliases.get('sensitive-data-service') is defined

- name: Set docker facts for collectory service
  set_fact:
    collectory_docker_data_dir: "/data/collectory"
  tags:
    - always
    - docker-compose
  when: service_aliases.get('collectory') is defined

- name: Set nginx Docker resolver configuration
  set_fact:
    nginx_docker_internal_resolver: "{{ (deployment_type in ['swarm', 'container']) | bool }}"
  tags:
    - docker-compose

- name: Set docker service container names (used in proxy_pass for nginx)
  set_fact:
    # Convention: la_<service> - these are the container service names in docker-compose
    # Only used when deployment_type is 'container' or 'swarm'
    # Can be overridden in inventory for custom naming
    cas_docker_host: "{{ cas_docker_host | default('la_cas', true) }}"
    cas_management_docker_host: "{{ cas_management_docker_host | default('la_cas_management', true) }}"
    apikey_docker_host: "{{ apikey_docker_host | default('la_apikey', true) }}"
    userdetails_docker_host: "{{ userdetails_docker_host | default('la_userdetails', true) }}"
    species_list_docker_host: "{{ species_list_docker_host | default('la_species_list', true) }}"
    collectory_docker_host: "{{ collectory_docker_host | default('la_collectory', true) }}"
    biocache_service_docker_host: "{{ biocache_service_docker_host | default('la_biocache_service', true) }}"
    bie_hub_docker_host: "{{ bie_hub_docker_host | default('la_bie_hub', true) }}"
    bie_index_docker_host: "{{ bie_index_docker_host | default('la_bie_index', true) }}"
    biocache_hub_docker_host: "{{ biocache_hub_docker_host | default('la_biocache_hub', true) }}"
    image_service_docker_host: "{{ image_service_docker_host | default('la_image_service', true) }}"
    logger_service_docker_host: "{{ logger_service_docker_host | default('la_logger_service', true) }}"
    namematching_service_docker_host: "{{ namematching_service_docker_host | default('la_namematching_service', true) }}"
    doi_service_docker_host: "{{ doi_service_docker_host | default('la_doi_service', true) }}"
    sensitive_data_service_docker_host: "{{ sensitive_data_service_docker_host | default('la_sensitive_data_service', true) }}"
    gatus_docker_host: "{{ gatus_docker_host | default('la_gatus', true) }}"
  tags:
    - always
    - only
    - docker-compose

- name: Debug - Docker user configuration
  debug:
    msg: |
      Docker users - tomcat: {{ tomcat_user }}, nginx: {{ nginx_user }}, cas: {{ cas_user }}, collectory: {{ collectory_user }}, userdetails: {{ userdetails_user }}, apikey: {{ apikey_user }}
      Nginx Docker Internal Resolver: {{ nginx_docker_internal_resolver }}
      Deployment Type: {{ deployment_type }}
  tags:
    - always
    - only
    - docker-compose



# Load common role variables early for common.yml tasks
- name: Load common role variables
  include_vars:
    file: "{{ playbook_dir }}/../../ala-install/ansible/roles/common/vars/main.yml"
  tags:
    - docker-compose

# Create common directories BEFORE any role tries to use them
- name: Run common directory and config setup
  include_tasks: common.yml
  tags:
    - docker-compose

- name: Ensure output directory exists
  file:
    path: "{{ docker_compose_data_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  tags:
    - docker-compose

- name: Ensure cert-validator directory exists
  file:
    path: "{{ docker_compose_data_dir }}/cert-validator"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  tags:
    - docker-compose

- name: Copy cert-validator script
  template:
    src: cert-validator.sh
    dest: "{{ docker_compose_data_dir }}/cert-validator/cert-validator.sh"
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  tags:
    - docker-compose


# Create clean dictionaries for easy access to software versions
# Uses version_variable from docker_services_desc dynamically
- name: Build service versions dictionary from docker_services_desc
  set_fact:
    service_versions_dict: "{{ service_versions_dict | default({}) | combine({item.key: vars[item.value.version_variable] | default('develop')}) }}"
  loop: "{{ docker_services_desc | dict2items }}"
  when: item.value.version_variable is defined
  loop_control:
    label: "{{ item.key }}"
  tags:
    - always
    - only
    - docker-compose
    - build

- name: Fetch latest ala-i18n version from apt.gbif.es repository
  block:
    - name: Download Packages.gz and extract version
      shell: |
        curl -s https://apt.gbif.es/dists/unstable/main/binary-amd64/Packages.gz | \
        gunzip | \
        awk '/^Package: ala-i18n$/{p=1; next} p && /^Version:/{print $2; p=0}' | \
        sort -V | \
        tail -1 | \
        sed 's/~.*//' | \
        sed 's/+.*//'
      register: gbif_i18n_version
      changed_when: false
      failed_when: false

    - name: Set i18n_version from apt.gbif.es
      set_fact:
        i18n_version: "{{ gbif_i18n_version.stdout | trim }}"
      when: gbif_i18n_version.stdout | length > 0

    - name: Display fetched i18n version
      debug:
        msg: "Latest ala-i18n version from apt.gbif.es: {{ i18n_version | default('unable to fetch') }}"      
  tags:
    - docker-compose


- name: DEBUG - Show physical server groups
  debug:
    msg:
      - "Physical Server: {{ hostvars[inventory_hostname].get('ansible_host', inventory_hostname) }}"
      - "Groups on this server: {{ physical_server_groups }}"
  tags:
    - docker-compose


- name: DEBUG - Inspect services detection
  debug:
    msg: 
      - "Host: {{ inventory_hostname }}"
      - "Group Names: {{ group_names }}"
      - "Physical Server Groups: {{ physical_server_groups }}"
      - "Services Enabled: {{ services_enabled }}"
      - "Enable MySQL (before calculation): {{ enable_mysql | default('undefined') }}"
      - "Services Desc MySQL group: {{ docker_services_desc['collectory'].group }}"
  tags:
    - docker-compose


# Debug after detecting services
- name: "DEBUG: Show services_enabled after detection"
  debug:
    msg: |
      Services detected after Detect enabled services task:
      {{ services_enabled }}
  tags:
    - docker-compose


# Always add nginx and ensure unique services
- name: Add nginx and ensure unique services list
  set_fact:
    services_enabled: "{{ (['nginx'] + services_enabled) | unique }}"
  tags:
    - always
    - docker-compose

- name: Debug - Show services configuration
  debug:
    msg: "Services enabled: {{ services_enabled }}"
  tags:
    - always
    - docker-compose
    - build

- name: Determine services present in the inventory (cluster-wide)
  set_fact:
    cluster_services: >-
      {{
        (cluster_services | default([])) +
        ([item.key] if (item.value.group in groups and (groups[item.value.group] | length > 0)) else [])
      }}
  loop: "{{ docker_services_desc | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags: [always, only, docker-compose, build]

- name: Add non-standard services to cluster_services
  set_fact:
    cluster_services: >-
      {{
        (cluster_services | default([])) +
        (['branding'] if ('branding' in groups and (groups['branding'] | length > 0)) else []) +
        (['ala-i18n'] if (i18n.enabled | default(false)) else [])
      }}
  tags: [always, only, docker-compose, build]

- name: Set services to build on this host
  set_fact:
    services_to_build: "{{ cluster_services | unique if (inventory_hostname == (groups['docker_compose'] | first)) else services_enabled }}"
  tags: [always, only, docker-compose, build]

- name: Debug - Show services to build
  debug:
    msg: "Services to build on this host: {{ services_to_build }}"
  tags:
    - always
    - only
    - docker-compose
    - build

# Create nginx directories BEFORE any role tries to use nginx_vhost
- name: Ensure nginx config directory exists
  file:
    path: "{{ nginx_conf_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Ensure nginx conf.d directory exists
  file:
    path: "{{ nginx_conf_dir }}/conf.d"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Ensure nginx sites-enabled directory exists
  file:
    path: "{{ nginx_conf_dir }}/sites-enabled"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Load nginx role defaults
  include_vars:
    file: "{{ playbook_dir }}/../../ala-install/ansible/roles/nginx/defaults/main.yml"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Generate nginx.conf
  template:
    src: "{{ playbook_dir }}/../../ala-install/ansible/roles/nginx/templates/nginx.conf.j2"
    dest: "{{ nginx_conf_dir }}/nginx.conf"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose




