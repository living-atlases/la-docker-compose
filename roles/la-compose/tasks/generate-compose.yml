# Generate gatus configuration when gatus group exists
- name: Create gatus config directory
  file:
    path: "{{ docker_compose_data_dir }}/gatus/config"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: groups['gatus'] is defined and groups['gatus']|length > 0
  tags:
    - docker-compose
    - config
    - gatus

- name: Generate gatus config.yaml
  template:
    src: docker-compose/gatus/config.yaml.j2
    dest: "{{ docker_compose_data_dir }}/gatus/config/config.yaml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: groups['gatus'] is defined and groups['gatus']|length > 0
  tags:
    - docker-compose
    - config
    - gatus

- name: Generate db-backup.yml
  template:
    src: docker-compose/infrastructure/db-backup.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/db-backup.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: enable_mysql | default(false) | bool or enable_postgres | default(false) | bool or enable_mongo | default(false) | bool
