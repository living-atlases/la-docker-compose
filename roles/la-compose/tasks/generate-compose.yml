# ============================================================================
# Final Validation and Health Checks (AFTER all generation)
# ============================================================================

- name: "Validate docker-compose generation"
  include_tasks: validate-docker-compose.yml
  tags:
    - validate
    - docker-compose

- name: "Display generated compose file location"
  debug:
    msg: |
      ✅ Docker Compose configuration successfully generated and validated!
      Location: {{ docker_compose_data_dir }}/

      Files created:
        ✓ docker-compose.yml (v3.8)
        ✓ .env (with database credentials)
        ✓ infrastructure/ directory with all services
        ✓ services/ directory with service configs
        ✓ logs/ directory with service subdirectories
        ✓ External volumes created (mysql-data, postgres-data, mongodb-data)

      Next steps:
        1. Review configuration: cat {{ data_dir }}/docker-compose.yml
        2. Start services: docker-compose -f {{ data_dir }}/docker-compose.yml up -d
        3. Access Gatus monitoring: http://your-domain/gatus/
  tags:
    - docker-compose

- name: "SSL Certificates: Start nginx to validate local certificates"
  shell: |
    cd "{{ docker_compose_data_dir }}" && docker compose up -d nginx 2>&1 || true
  environment:
    DOCKER_HOST: "{{ docker_socket }}"
  become: true
  when:
    - not use_la_site_certs | bool
    - auto_deploy | default(true) | bool
  tags:
    - nginx-validation

- name: "SSL Certificates: Wait briefly and check nginx is running"
  shell: |
    sleep 5 && docker ps | grep -q la_nginx && echo "nginx running"
  become: true
  when:
    - not use_la_site_certs | bool
    - auto_deploy | default(true) | bool
  register: nginx_check
  tags:
    - nginx-validation

- name: "SSL Certificates: Verify certificate file exists in host"
  stat:
    path: "{{ inventory_dir }}/certs/letsencrypt/live/l-a.site/{{ ssl_cert_file }}"
  register: cert_file_stat
  when:
    - not use_la_site_certs | bool
    - auto_deploy | default(true) | bool
  tags:
    - nginx-validation

- name: "SSL Certificates: Assert certificate file exists"
  assert:
    that:
      - cert_file_stat.stat.exists or ansible_check_mode
    fail_msg: "Certificate file not found: {{ inventory_dir }}/certs/letsencrypt/live/l-a.site/{{ ssl_cert_file }}"
    success_msg: "Certificate file exists: {{ ssl_cert_file }}"
  when:
    - not use_la_site_certs | bool
    - auto_deploy | default(true) | bool
  tags:
    - nginx-validation

- name: "SSL Certificates: Verify key file exists in host"
  stat:
    path: "{{ inventory_dir }}/certs/letsencrypt/live/l-a.site/{{ ssl_key_file }}"
  register: key_file_stat
  when:
    - not use_la_site_certs | bool
    - auto_deploy | default(true) | bool
  tags:
    - nginx-validation

- name: "SSL Certificates: Assert key file exists"
  assert:
    that:
      - key_file_stat.stat.exists or ansible_check_mode
    fail_msg: "Key file not found: {{ inventory_dir }}/certs/letsencrypt/live/l-a.site/{{ ssl_key_file }}"
    success_msg: "Key file exists: {{ ssl_key_file }}"
  when:
    - not use_la_site_certs | bool
    - auto_deploy | default(true) | bool
  tags:
    - nginx-validation

- name: "SSL Certificates: Display validation success for local certs"
  debug:
    msg: |
      ✅ SSL Local Certificates Validated Successfully!

      Configuration:
      - Source: Local inventory directory
      - Certificate directory: {{ ssl_certificate_server_dir }}
      - Certificate file: {{ ssl_cert_file }}
      - Key file: {{ ssl_key_file }}

      Status:
      ✓ Certificate file found in nginx
      ✓ Key file found in nginx
      ✓ Nginx container running with SSL enabled
  when:
    - not use_la_site_certs | bool
    - auto_deploy | default(true) | bool
  tags:
    - nginx-validation

- name: "SSL Certificates: Display info for Docker image certs"
  debug:
    msg: |
      ℹ️  Using Docker Image Certificates

      Configuration:
      - Source: Docker image livingatlases/l-a-site-certs:latest
      - Certificates will be provided by the Docker image
      - Configure ssl_certificate_server_dir to match image certificate location

      Note: Certificate validation skipped (using Docker image source)
  when: use_la_site_certs | bool
  tags:
    - nginx-validation

# ============================================================================
# Final Validation - Check for ala-install references
# ============================================================================

# This is a check for any remaining ala-install absolute paths in the generated files
# that will cause runtime issues in containers
- name: "Validation: Check for ala-install references in generated files"
  shell: |
    set -o pipefail
    cd {{ docker_compose_data_dir }}
    # Search for ala-install in generated files, excluding comments and specific files
    grep -r "ala-install" . 2>/dev/null | grep -v "# Generated" | grep -v "dockerfiles/branding/deploy.sh" || true
  args:
    executable: /bin/bash
  register: ala_install_check
  changed_when: false
  tags:
    - validate
    - docker-compose

- name: "Display final validation summary"
  debug:
    msg: |
      ✅ Docker Compose generation completed successfully!

      📋 Validation checks passed:
        ✓ Docker daemon available
        ✓ Database volumes created (external)
        ✓ Log directories created
        {% if ala_install_check.stdout %}
        ⚠️  WARNING: Found 'ala-install' references in generated files:
        {{ ala_install_check.stdout }}
        {% else %}
        ✓ No 'ala-install' references in generated files
        {% endif %}

      📁 Location: {{ data_dir }}/

      🚀 Ready to deploy with:
         docker-compose up -d
  tags:
    - validate
    - docker-compose
