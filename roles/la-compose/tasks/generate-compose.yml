- name: Create gatus nginx vhost
  include_role:
    name: nginx_vhost
  vars:
    appname: "gatus"
    hostname: "{{ gatus_url }}"
    context_path: "/"
    nginx_upstream_host: "la_gatus_service"
    vhost_required: true
    nginx_vhost_fast_mode: true
  when:
    - "'gatus' in services_enabled"
    - "groups['gatus'] is defined and groups['gatus'] | length > 0"
    - "gatus_url is defined"
  tags:
    - gatus
    - nginx_vhost
    - config
    - docker-compose

- name: Generate gatus.yml
  template:
    src: docker-compose/infrastructure/gatus.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/gatus.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'gatus' in services_enabled"
  tags:
    - docker-compose

# Collect every FQDN that gatus monitors and add it as a docker-network alias on the
# nginx container, so checks done from inside the docker network resolve to nginx.
# IMPORTANT: gatus runs on ONE host; only that host's nginx needs the aliases.
# Gated to 'gatus' in services_enabled so it runs only on the gatus host (where
# the *-http.yaml files are local). On other hosts this block is skipped and
# nginx_docker_internal_aliases stays empty (correct — those nginx instances do
# not need internal aliases for gatus checks).
# slurp reads from the remote target (gatus host), not the controller, unlike
# lookup('file') which caused FATAL on hosts where the files don't exist.
- name: Find gatus endpoint files (only on the gatus host where they live)
  find:
    paths: "{{ gatus_config_dir | default(docker_compose_data_dir + '/gatus/config') }}"
    patterns: "*-http.yaml"
  register: gatus_endpoint_files
  when: "'gatus' in services_enabled"
  tags:
    - docker-compose
    - nginx

- name: Slurp gatus endpoint files (local to the gatus host)
  slurp:
    src: "{{ item.path }}"
  register: gatus_endpoint_blobs
  loop: "{{ gatus_endpoint_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when:
    - "'gatus' in services_enabled"
    - gatus_endpoint_files.files | default([]) | length > 0
  tags:
    - docker-compose
    - nginx

- name: Extract monitored hostnames into nginx_docker_internal_aliases
  set_fact:
    nginx_docker_internal_aliases: >-
      {{ nginx_docker_internal_aliases | default([])
         | union([((item.content | b64decode | from_yaml).endpoints | first).group])
         | unique }}
  loop: "{{ gatus_endpoint_blobs.results | default([]) }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  when: gatus_endpoint_blobs.results is defined
  tags:
    - docker-compose
    - nginx

- name: Generate nginx.yml (after collecting aliases)
  template:
    src: docker-compose/infrastructure/nginx.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/nginx.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - always
    - nginx
    - docker-compose

- name: Clean up stale gatus SQLite WAL files before start
  command: >
    docker run --rm -v la_gatus-data:/data alpine
    sh -c "rm -f /data/data.db-shm /data/data.db-wal"
  become: true
  changed_when: false
  ignore_errors: true
  when: "'gatus' in services_enabled"
  tags:
    - docker-compose
    - gatus

- name: Create initialization directories for Solr and Cassandra
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  loop:
    - "{{ docker_compose_data_dir }}/solr/init"
    - "{{ docker_compose_data_dir }}/solr/lib"
    - "{{ docker_compose_data_dir }}/cassandra/init"
  tags:
    - solr
    - cassandra
    - docker-compose-docker
    - docker-compose

- name: Copy Solr configuration files from solrcloud_config role
  copy:
    src: "{{ playbook_dir }}/../ala-install/ansible/roles/solrcloud_config/files/"
    dest: "{{ docker_compose_data_dir }}/solr/init/"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  tags:
    - solr
    - docker-compose-docker
    - docker-compose

# The biocache configset under files/ ships WITHOUT schema.xml — ala-install
# generates it from biocache_schema_docvalues.xml (templates/, doc-values variant)
# at deploy time. Without this, the biocache collection CREATE fails ("no schema")
# while bie/bie-offline (which ship schema.xml in files/) succeed.
- name: Generate biocache schema.xml from solrcloud_config template (doc values)
  template:
    src: "{{ playbook_dir }}/../ala-install/ansible/roles/solrcloud_config/templates/biocache_schema_docvalues.xml"
    dest: "{{ docker_compose_data_dir }}/solr/init/biocache/conf/schema.xml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  vars:
    dynamic_solr_schema_biocache: false
    dynamic_solr_schema_biocache_el_cl: false
  tags:
    - solr
    - docker-compose-docker
    - docker-compose

# The biocache schema's geohash field is a SpatialRecursivePrefixTreeFieldType using
# JtsSpatialContextFactory, which needs the JTS Topology Suite jars on the classpath.
# The official solr image lacks them (ala-install copies them to server/lib/ext on VMs,
# or uses the prebuilt solr8-jts image). We stage them here and solr.yml.j2 bind-mounts
# each jar into the container's /opt/solr/server/lib/ext (the Jetty server classloader,
# mirroring the VM path — the webapp classloader that loads the spatial field type
# delegates to it as parent). Without this, biocache core creation fails:
# NoClassDefFoundError CoordinateSequenceFactory.
- name: Stage JTS jars for Solr spatial field types (biocache geohash)
  copy:
    src: "{{ playbook_dir }}/../ala-install/ansible/roles/solrcloud/files/libs/{{ item }}"
    dest: "{{ docker_compose_data_dir }}/solr/lib/{{ item }}"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  loop:
    - jts-core-1.18.1.jar
    - jts-io-common-1.18.1.jar
  tags:
    - solr
    - docker-compose-docker
    - docker-compose

- name: Copy Cassandra schema from biocache3-db role
  copy:
    src: "{{ playbook_dir }}/../ala-install/ansible/roles/biocache3-db/files/cassandra/cassandra3-schema.txt"
    dest: "{{ docker_compose_data_dir }}/cassandra/init/schema.cql"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  tags:
