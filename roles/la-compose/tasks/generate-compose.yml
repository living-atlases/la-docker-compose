---
# Generate docker-compose.yml from templates
# Using existing ala-install variables

- name: Ensure docker_compose_data_dir is set
  set_fact:
    docker_compose_data_dir: "{{ docker_compose_data_dir | default('/data/docker-compose') }}"
  tags:
    - always
    - only
    - docker-compose
    - build

# Enforce deployment_type=container for the entire generate-compose flow.
# This uses set_fact (higher precedence than inventory vars) to prevent
# ala-install roles (e.g. common/setfacts) from resetting it to 'vm'
# via their own set_fact calls.
- name: Enforce deployment_type=container for all included roles
  set_fact:
    deployment_type: container
  tags:
    - always

# use_la_site_certs is decided upstream by generator-living-atlas (auto-detected
# from the deployment domain: l-a.site or a subdomain -> demo wildcard certs).
# The generated inventory always carries an explicit value, so here we only
# normalise it to a boolean and provide a safe false fallback for hand-written
# inventories that omit it. la-compose itself performs no domain detection.
- name: "SSL: Normalise use_la_site_certs (decided upstream by the generator)"
  set_fact:
    use_la_site_certs: "{{ use_la_site_certs | default(false) | bool }}"
  tags:
    - always
    - docker-compose

- name: Ensure nginx_docker_internal_aliases is a list
  set_fact:
    nginx_docker_internal_aliases: "{{ nginx_docker_internal_aliases | from_json if nginx_docker_internal_aliases is string else nginx_docker_internal_aliases }}"
  tags:
    - always
    - docker-compose

- name: Ensure docker_extra_hosts is a list
  set_fact:
    docker_extra_hosts: "{{ docker_extra_hosts | from_json if docker_extra_hosts is string else docker_extra_hosts }}"
  tags:
    - always
    - docker-compose

- name: Create docker_extra_hosts_dict mapping
  set_fact:
    docker_extra_hosts_dict: >-
      {%- set result = {} -%}
      {%- for entry in docker_extra_hosts -%}
        {%- set parts = entry.split(':', 1) -%}
        {%- if parts | length == 2 -%}
          {%- set _ = result.update({parts[0]: parts[1]}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  tags:
    - always
    - docker-compose

# ============================================================================
# Cross-host datastore reachability (VM model, NO swarm)
# ----------------------------------------------------------------------------
# In plain docker-compose a `depends_on` cannot cross hosts: each host renders
# its own compose file and depends_on only resolves services in that same file.
# A datastore (cassandra/solr/zookeeper/mysql/postgres) legitimately runs on a
# different host than its consumers (same as the VM deployment), addressed by
# host:port + static DNS. We therefore:
#   - detect, per consumed datastore, whether it is co-located on this host or
#     remote (owning host = groups[<datastore-group>][0]);
#   - for remote datastores, inject alias->remote-private-IP into
#     docker_extra_hosts_dict so the consumer's config var resolves via /etc/hosts;
#   - publish the datastore port on the host private IP when multi-host, so the
#     remote consumer can actually reach it (the datastore template only renders
#     on its owning host, so this flag is scoped there);
#   - omit `depends_on` toward a remote datastore in the consumer template and let
#     `restart: unless-stopped` + app retry converge (swarm converge-by-retry).
# Single-host: every datastore is co-located => no remote aliases, no publishing,
# native depends_on preserved. No behaviour change.
# ============================================================================

- name: Define datastore cross-host spec
  set_fact:
    datastore_cluster_spec:
      cassandra:
        groups: ['cassandra5', 'cassandra3', 'cassandra']
        port: 9042
        aliases: ['cassandra', 'la_cassandra']
      solr:
        groups: ['solrcloud', 'solr']
        port: 8983
        aliases: ['solr', 'la_solr']
      zookeeper:
        groups: ['solrcloud', 'solr', 'zookeeper']
        port: 2181
        aliases: ['zookeeper', 'la_zookeeper']
      mysql:
        groups: ['mysql', 'cas-servers', 'collectory', 'species-list', 'logger-service', 'alerts-service']
        port: 3306
        aliases: ['mysql', 'la_mysql']
      postgres:
        groups: ['postgres', 'spatial', 'image-service', 'doi-service', 'data_quality_filter_service']
        port: 5432
        aliases: ['postgres', 'la_postgres']
      mongodb:
        groups: ['mongo', 'mongodb', 'cas-servers', 'ecodata']
        port: 27017
        aliases: ['mongodb', 'la_mongodb']
  tags:
    - always
    - docker-compose

- name: Compute datastore endpoints (co-located vs remote) per consumed datastore
  set_fact:
    datastore_endpoints: >-
      {%- set result = {} -%}
      {%- for ds, spec in datastore_cluster_spec.items() -%}
        {%- set owner = namespace(host=none) -%}
        {%- for g in spec.groups -%}
          {%- if owner.host is none and g in groups and (groups[g] | length > 0) -%}
            {%- set owner.host = groups[g] | first -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if owner.host is not none -%}
          {%- set colo = namespace(val=false) -%}
          {%- for g in spec.groups -%}
            {%- if g in (physical_server_groups | default([])) -%}
              {%- set colo.val = true -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set colocated = colo.val -%}
          {#- Resolve the owner's literal IP from docker_extra_hosts_dict (sourced from -#}
          {#- LA_etc_hosts via the generator). The owner is an alias host that does NOT -#}
          {#- gather facts and whose ansible_host is a DNS name, so we must NOT derive -#}
          {#- the IP here; we look it up by the owner's underlying hostname. -#}
          {%- set owner_name = hostvars[owner.host].ansible_host | default(owner.host) -%}
          {%- set ip = docker_extra_hosts_dict.get(owner_name, docker_extra_hosts_dict.get(owner.host, '')) -%}
          {%- set _ = result.update({ds: {'owner': owner.host, 'colocated': colocated, 'ip': ip, 'port': spec.port, 'aliases': spec.aliases}}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  tags:
    - always
    - docker-compose

- name: Inject remote datastore aliases into docker_extra_hosts_dict
  set_fact:
    docker_extra_hosts_dict: >-
      {%- set result = docker_extra_hosts_dict | default({}) | combine({}) -%}
      {%- for ds, ep in datastore_endpoints.items() -%}
        {#- Only inject a remote datastore alias when we resolved a literal IPv4 for -#}
        {#- the owner (from LA_etc_hosts). Never inject a DNS name: docker --add-host -#}
        {#- rejects it. A missing IP means LA_etc_hosts is incomplete for the cluster. -#}
        {%- if not ep.colocated and ep.ip is match('^\\d{1,3}(\\.\\d{1,3}){3}$') -%}
          {%- for a in ep.aliases -%}
            {%- set _ = result.update({a: ep.ip}) -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  tags:
    - always
    - docker-compose

- name: Validate docker_extra_hosts_dict contains only literal IPv4 addresses
  assert:
    that:
      - docker_extra_hosts_dict | dict2items | rejectattr('value', 'match', '^\d{1,3}(\.\d{1,3}){3}$') | list | length == 0
    fail_msg: >-
      docker_extra_hosts contains a non-IP value (likely a DNS name):
      {{ docker_extra_hosts_dict | dict2items | rejectattr('value', 'match', '^\d{1,3}(\.\d{1,3}){3}$') | list }}.
      docker --add-host requires literal IPs. This usually means LA_etc_hosts is
      incomplete for the cluster (each cluster host needs an "IP hostname" line).
    quiet: true
  tags:
    - always
    - docker-compose

- name: Warn when a remote datastore could not be resolved to a literal IP
  debug:
    msg: >-
      Remote datastore '{{ item.key }}' (owner {{ item.value.owner }}) has no literal IP;
      its aliases {{ item.value.aliases }} will NOT resolve inside containers.
      Add an "IP {{ hostvars[item.value.owner].ansible_host | default(item.value.owner) }}"
      line to LA_etc_hosts.
  loop: "{{ datastore_endpoints | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - not item.value.colocated
    - not (item.value.ip is match('^\d{1,3}(\.\d{1,3}){3}$'))
  tags:
    - always
    - docker-compose

- name: Derive cluster-wide datastore port publishing facts
  set_fact:
    host_private_ip: "{{ ansible_default_ipv4.address | default(hostvars[inventory_hostname].ansible_host) | default('0.0.0.0') }}"
    publish_db_ports_clusterwide: "{{ (groups['docker_compose'] | default([]) | length | int) > 1 }}"
  tags:
    - always
    - docker-compose

# Define system variables that should NOT be copied when bulk-loading from service aliases
# These are internal Ansible variables that belong only to their source context
- name: Define system variables blacklist
  set_fact:
    system_vars_blacklist:
      - inventory_hostname
      - inventory_hostname_short
      - inventory_dir
      - inventory_file
      - group_names
      - groups
      - playbook_dir
      - role_names
      - role_path
      - omit
      - deployment_type
      # Deployment-level user mapping (container uid). It is set once for all
      # services to docker_container_uid (=1000) just above; the ala-install roles
      # create /data/<svc>{,/config,/cache,...} with owner={{tomcat_user}}. The
      # alias hostvars carry the VM default (tomcat -> uid 997); without this
      # blacklist the per-service bulk-load re-imports tomcat_user=tomcat and
      # CLOBBERS the uid-1000 value, so the role makes dirs tomcat:tomcat 0750.
      # The container runs as uid 1000 and cannot traverse the parent -> Spring
      # crash-loop "Config data location '/data/<svc>/config/' does not exist"
      # (biocache-hub, collectory, species-list; build #186). This is the swarm
      # *-docker.yml `tomcat_user: docker_default_user` contract — keep it out of
      # the bulk-load instead of patching perms afterwards.
      - tomcat_user
  tags:
    - always

- name: Set docker facts for all services
  set_fact:
    # Core user variables for all services - use numeric UID to match container runtime
    # nginx_user stays at role default (nginx): official nginx image requires a passwd name, not a numeric UID
    tomcat_user: "{{ docker_container_uid }}"
  tags:
    - always
    - docker-compose

- name: Set docker facts for cas services
  set_fact:
    cas_user: "{{ docker_container_uid }}"
    collectory_user: "{{ docker_container_uid }}"
    userdetails_user: "{{ docker_container_uid }}"
    apikey_user: "{{ docker_container_uid }}"
    cas_add_mongo_users: "{{ cas_add_mongo_users | default(true) }}"
  tags:
    - always
    - docker-compose
  when: service_aliases.get('cas-servers') is defined

- name: Set docker facts for namematching service
  set_fact:
    namematching_user: "{{ docker_container_uid }}"
  tags:
    - always
    - docker-compose
  when: service_aliases.get('namematching-service') is defined

- name: Set docker facts for sensitive data service
  set_fact:
    sensitive_data_user: "{{ docker_container_uid }}"
  tags:
    - always
    - docker-compose
  when: service_aliases.get('sensitive-data-service') is defined

- name: Set docker facts for collectory service
  set_fact:
    collectory_docker_data_dir: "/data/collectory"
  tags:
    - always
    - docker-compose
  when: service_aliases.get('collectory') is defined

- name: Set nginx Docker resolver configuration
  set_fact:
    nginx_docker_internal_resolver: "{{ (deployment_type in ['swarm', 'container']) | bool }}"
  tags:
    - always
    - docker-compose

- name: Set docker service container names (used in proxy_pass for nginx)
  set_fact:
    # Convention: la_<service> - these are the container service names in docker-compose
    # Only used when deployment_type is 'container' or 'swarm'
    # Can be overridden in inventory for custom naming
    cas_docker_host: "{{ cas_docker_host | default('la_cas', true) }}"
    cas_management_docker_host: "{{ cas_management_docker_host | default('la_cas_management', true) }}"
    apikey_docker_host: "{{ apikey_docker_host | default('la_apikey', true) }}"
    userdetails_docker_host: "{{ userdetails_docker_host | default('la_userdetails', true) }}"
    species_list_docker_host: "{{ species_list_docker_host | default('la_species_list', true) }}"
    collectory_docker_host: "{{ collectory_docker_host | default('la_collectory', true) }}"
    biocache_service_docker_host: "{{ biocache_service_docker_host | default('la_biocache_service', true) }}"
    bie_hub_docker_host: "{{ bie_hub_docker_host | default('la_bie_hub', true) }}"
    bie_index_docker_host: "{{ bie_index_docker_host | default('la_bie_index', true) }}"
    biocache_hub_docker_host: "{{ biocache_hub_docker_host | default('la_biocache_hub', true) }}"
    image_service_docker_host: "{{ image_service_docker_host | default('la_image_service', true) }}"
    logger_service_docker_host: "{{ logger_service_docker_host | default('la_logger_service', true) }}"
    namematching_service_docker_host: "{{ namematching_service_docker_host | default('la_namematching_service', true) }}"
    doi_service_docker_host: "{{ doi_service_docker_host | default('la_doi_service', true) }}"
    sensitive_data_service_docker_host: "{{ sensitive_data_service_docker_host | default('la_sensitive_data_service', true) }}"
    gatus_docker_host: "{{ gatus_docker_host | default('la_gatus', true) }}"
  tags:
    - always
    - only
    - docker-compose

- name: Debug - Docker user configuration
  debug:
    msg: |
      Container UID/GID: {{ docker_compose_userid }}/{{ docker_compose_usergid }}
      Service users - tomcat: {{ tomcat_user }}, nginx: {{ nginx_user }}, cas: {{ cas_user | default('N/A') }}, collectory: {{ collectory_user | default('N/A') }}, userdetails: {{ userdetails_user | default('N/A') }}, apikey: {{ apikey_user | default('N/A') }}
      Nginx Docker Internal Resolver: {{ nginx_docker_internal_resolver }}
      Deployment Type: {{ deployment_type }}
  tags:
    - always
    - only
    - docker-compose


# Run common role from ala-install to set up all variables and facts (maven_repo_url, etc.)
# This MUST run before any other ala-install roles to ensure all variables are defined
# The common role handles:
#  - setfacts.yml: Define maven_repo_url, deployment_type defaults, etc.
#  - Directory creation and validation
#  - Deployment type validation
- name: Run ala-install common role
  include_role:
    name: common
    public: true  # Makes vars/ and set_fact available globally for la-compose tasks
  tags:
    - always
    - config
    - common

# Create docker-compose specific common directories and configs
- name: Run docker-compose specific common setup
  include_tasks: common.yml
  tags:
    - docker-compose

# Enable gatus endpoint generation when gatus group exists
- name: Set use_gatus fact
  set_fact:
    use_gatus: true
  when: groups['gatus'] is defined and groups['gatus']|length > 0
  tags:
    - docker-compose
    - config
    - gatus

- name: Ensure output directory exists
  file:
    path: "{{ docker_compose_data_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  tags:
    - docker-compose

- name: Ensure cert-validator directory exists
  file:
    path: "{{ docker_compose_data_dir }}/cert-validator"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  tags:
    - docker-compose

- name: Copy cert-validator script
  template:
    src: cert-validator.sh
    dest: "{{ docker_compose_data_dir }}/cert-validator/cert-validator.sh"
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  tags:
    - docker-compose


# Create clean dictionaries for easy access to software versions
# Uses version_variable from docker_services_desc dynamically
- name: Build service versions dictionary from docker_services_desc
  set_fact:
    service_versions_dict: "{{ service_versions_dict | default({}) | combine({item.key: vars[item.value.version_variable] | default('develop')}) }}"
  loop: "{{ docker_services_desc | dict2items }}"
  when: item.value.version_variable is defined
  loop_control:
    label: "{{ item.key }}"
  tags:
    - always
    - only
    - docker-compose
    - build

- name: Fetch latest ala-i18n version from apt.gbif.es repository
  block:
    - name: Download Packages.gz and extract version
      shell: |
        curl -s https://apt.gbif.es/dists/unstable/main/binary-amd64/Packages.gz | \
        gunzip | \
        awk '/^Package: ala-i18n$/{p=1; next} p && /^Version:/{print $2; p=0}' | \
        sort -V | \
        tail -1 | \
        sed 's/~.*//' | \
        sed 's/+.*//'
      register: gbif_i18n_version
      changed_when: false
      failed_when: false

    - name: Set i18n_version from apt.gbif.es
      set_fact:
        i18n_version: "{{ gbif_i18n_version.stdout | trim }}"
      when: gbif_i18n_version.stdout | length > 0

    - name: Display fetched i18n version
      debug:
        msg: "Latest ala-i18n version from apt.gbif.es: {{ i18n_version | default('unable to fetch') }}"
  tags:
    - docker-compose


- name: DEBUG - Show physical server groups
  debug:
    msg:
      - "Physical Server: {{ hostvars[inventory_hostname].get('ansible_host', inventory_hostname) }}"
      - "Groups on this server: {{ physical_server_groups }}"
  tags:
    - docker-compose


- name: DEBUG - Inspect services detection
  debug:
    msg:
      - "Host: {{ inventory_hostname }}"
      - "Group Names: {{ group_names }}"
      - "Physical Server Groups: {{ physical_server_groups }}"
      - "Services Enabled: {{ services_enabled }}"
      - "Enable MySQL (before calculation): {{ enable_mysql | default('undefined') }}"
      - "Services Desc MySQL group: {{ docker_services_desc['collectory'].group }}"
  tags:
    - docker-compose


# Debug after detecting services
- name: "DEBUG: Show services_enabled after detection"
  debug:
    msg: |
      Services detected after Detect enabled services task:
      {{ services_enabled }}
  tags:
    - docker-compose


# Always add nginx and ensure unique services
- name: Add nginx and ensure unique services list
  set_fact:
    services_enabled: "{{ (['nginx'] + services_enabled) | unique }}"
  tags:
    - always
    - docker-compose

- name: Debug - Show services configuration
  debug:
    msg: "Services enabled: {{ services_enabled }}"
  tags:
    - always
    - docker-compose
    - build

- name: Determine services present in the inventory (cluster-wide)
  set_fact:
    cluster_services: >-
      {{
        (cluster_services | default([])) +
        ([item.key] if (item.value.group in groups and (groups[item.value.group] | length > 0)) else [])
      }}
  loop: "{{ docker_services_desc | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  tags: [always, only, docker-compose, build]

- name: Add non-standard services to cluster_services
  set_fact:
    cluster_services: >-
      {{
        (cluster_services | default([])) +
        (['branding'] if ('branding' in groups and (groups['branding'] | length > 0)) else []) +
        (['ala-i18n'] if (i18n.enabled | default(false)) else [])
      }}
  tags: [always, only, docker-compose, build]

- name: Set services to build on this host
  set_fact:
    services_to_build: "{{ cluster_services | unique if (inventory_hostname == (groups['docker_compose'] | first)) else services_enabled }}"
  tags: [always, only, docker-compose, build]

- name: Debug - Show services to build
  debug:
    msg: "Services to build on this host: {{ services_to_build }}"
  tags:
    - always
    - only
    - docker-compose
    - build

# Create nginx directories BEFORE any role tries to use nginx_vhost
- name: Ensure nginx config directory exists
  file:
    path: "{{ nginx_conf_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Ensure nginx conf.d directory exists
  file:
    path: "{{ nginx_conf_dir }}/conf.d"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Ensure nginx sites-enabled directory exists
  file:
    path: "{{ nginx_conf_dir }}/sites-enabled"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

# Load nginx role defaults WITHOUT clobbering inventory-provided nginx_* vars.
# A plain include_vars has higher precedence than inventory group_vars, so it
# would override host customizations (nginx_other_log_formats, client_max_body_size,
# rate limits, cache, ...). We namespace the defaults and only fill the gaps.
- name: Load nginx role defaults (namespaced)
  include_vars:
    file: "{{ playbook_dir }}/../ala-install/ansible/roles/nginx/defaults/main.yml"
    name: _nginx_role_defaults
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Apply nginx defaults only where inventory did not provide a value
  set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ _nginx_role_defaults | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - "'nginx' in services_enabled"
    - item.key not in hostvars[inventory_hostname]
  tags:
    - docker-compose

# nginx.conf is rendered in the general (docker_compose host) scope, which does NOT
# bulk-load per-service-group vars. So `nginx_other_log_formats` defined under a service
# group (e.g. [logger-service:vars] sets it to ["postdata '$request_body'"]) never reaches
# this render and the previous task fills it with the role default []. Meanwhile the logger
# vhost — rendered with the logger-service alias context — emits `access_log ... postdata`,
# which references a log_format that nginx.conf never defines => nginx: [emerg] unknown log
# format "postdata" => nginx crash-loops => cas (depends_on nginx healthy) never starts.
# Fix: union nginx_other_log_formats across every group co-located on this physical server
# (same ansible_host), mirroring physical_server_groups detection in setup-facts.yml.
- name: Collect nginx_other_log_formats from co-located service groups
  set_fact:
    nginx_other_log_formats: >-
      {%- set result = [] -%}
      {%- for host in groups['all'] -%}
        {%- if hostvars[host].get('ansible_host', host) == hostvars[inventory_hostname].get('ansible_host', inventory_hostname) -%}
          {%- for fmt in hostvars[host].get('nginx_other_log_formats', []) -%}
            {%- if fmt not in result -%}
              {%- set _ = result.append(fmt) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose

- name: Generate nginx.conf
  template:
    src: "{{ playbook_dir }}/../ala-install/ansible/roles/nginx/templates/nginx.conf.j2"
    dest: "{{ nginx_conf_dir }}/nginx.conf"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - docker-compose


# Bulk load all CAS-related variables from service alias context (single pass)
# CAS5, USERDETAILS, APIKEY and CAS-MANAGEMENT all share the same source
# (service_aliases['cas-servers']), so one load + one normalize is enough.
- name: "Bulk load CAS-related variables from service alias context"
  set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: >-
    {{ hostvars[service_aliases.get('cas-servers', '')] | default({})
       | dict2items
       | selectattr('key', 'match', '^[a-zA-Z_][a-zA-Z0-9_]*$')
       | rejectattr('key', 'match', '^ansible_.*')
       | rejectattr('key', 'in', system_vars_blacklist)
