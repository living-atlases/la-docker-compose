    - "'biocache_service' in services_enabled"
    - "service_aliases.get('biocache-service-clusterdb') is defined"
  tags:
    - biocache-service
    - config

- name: Ensure database init directories exist with correct permissions
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  loop:
    - "{{ docker_compose_data_dir }}/db-backups"
    - "{{ docker_compose_data_dir }}/mysql/init"
    - "{{ docker_compose_data_dir }}/mongodb/init"
    - "{{ docker_compose_data_dir }}/var-log-atlas/cas"
    - "{{ docker_compose_data_dir }}/var-log-atlas/cas-management"
    - "{{ docker_compose_data_dir }}/var-log-atlas/apikey"
    - "{{ docker_compose_data_dir }}/var-log-atlas/userdetails"
    - "{{ docker_compose_data_dir }}/var-log-atlas/image-service"
  tags:
    - docker-compose

- name: Set CAS database variables from inventories for MongoDB initialization
  set_fact:
    cas_tickets_username: "{{ cas_tickets_username | default('cas-ticket-user') }}"
    cas_tickets_password: "{{ cas_tickets_password | default(lookup('password', '/dev/null length=20')) }}"
    cas_tickets_db: "{{ cas_tickets_db | default('cas-ticket-registry') }}"
    cas_services_username: "{{ cas_services_username | default('cas-services-user') }}"
    cas_services_password: "{{ cas_services_password | default(lookup('password', '/dev/null length=20')) }}"
    cas_services_db: "{{ cas_services_db | default('cas-service-registry') }}"
    cas_audit_username: "{{ cas_audit_username | default('cas-audit-user') }}"
    cas_audit_password: "{{ cas_audit_password | default(lookup('password', '/dev/null length=20')) }}"
    cas_audit_db: "{{ cas_audit_db | default('cas-audit-repository') }}"
    cas_spring_session_username: "{{ cas_spring_session_username | default('cas-session-user') }}"
    cas_spring_session_password: "{{ cas_spring_session_password | default(lookup('password', '/dev/null length=20')) }}"
    spring_session_mongo_collection: "{{ spring_session_mongo_collection | default('spring-sessions') }}"
  when: "'cas' in services_enabled"
  tags:
    - docker-compose

# Build JAVA_OPTS for each service from inventory variables
- name: Initialize temp_java_opts variable
  set_fact:
    temp_java_opts: {}
  tags:
    - docker-compose

- name: Build JAVA_OPTS strings for each service
  set_fact:
    temp_java_opts: "{{ temp_java_opts | default({}) | combine({
      item: '-Djava.awt.headless=true -Xmx' +
            (vars.get(item.replace('-', '_') + '_max_memory', '2g')) +
            ' -Xms' +
            (vars.get(item.replace('-', '_') + '_min_memory', '1g')) +
            ' ' +
            (vars.get('java_security_opts', '-Dlog4j2.formatMsgNoLookups=true'))
    }) }}"
  loop: "{{ services_enabled | difference(['nginx', 'gatus', 'mysql', 'mongodb']) }}"

# Build service_extra_params dict for templates
- name: Initialize service_extra_params variable
  set_fact:
    service_extra_params: {}
  tags:
    - docker-compose

- name: Build extra_params dict for services
  set_fact:
    service_extra_params: "{{ service_extra_params | default({}) | combine({
      item: docker_services_desc.get(item, {}).get('extra_params', [])
    }) }}"
  loop: "{{ services_enabled | difference(['nginx', 'gatus', 'mysql', 'mongodb']) }}"

- name: Set service_java_opts_dict from temp_java_opts
  set_fact:
    service_java_opts_dict: "{{ temp_java_opts }}"
  tags:
    - docker-compose

- name: Debug - Show service_extra_params (extra JVM parameters defined per service)
  debug:
    msg: |
      Services with extra_params that will be concatenated in .env:
      {% for service, extras in service_extra_params.items() %}
      {% if extras %}
        {{ service }}: {{ extras | map(attribute='key') | list | join(', ') }}
      {% endif %}
      {% endfor %}
  tags:
    - docker-compose

- name: Debug - Show generated JAVA_OPTS for services (BASE - extras added in template)
  debug:
    msg: "{{ service_java_opts_dict }}"
  tags:
    - docker-compose

- name: Generate .env file with database passwords from inventories
  template:
    src: docker-compose.env.j2
    dest: "{{ docker_compose_data_dir }}/.env"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  tags:
    - docker-compose

- name: Generate docker-compose.yml
  template:
    src: docker-compose/base.yml.j2
    dest: "{{ docker_compose_data_dir }}/docker-compose.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  tags:
    - docker-compose

# Create subdirectories for organized service files
- name: Create infrastructure directory for docker-compose files
  file:
    path: "{{ docker_compose_data_dir }}/infrastructure"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  tags:
    - always
    - docker-compose

- name: Create services directory for docker-compose files
  file:
    path: "{{ docker_compose_data_dir }}/services"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  tags:
    - always
    - docker-compose


# Generate infrastructure service files
- name: Generate i18n.yml if enabled
  template:
    src: docker-compose/infrastructure/i18n.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/i18n.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  tags:
    - i18n
    - docker-compose

- name: Generate nginx.yml
  template:
    src: docker-compose/infrastructure/nginx.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/nginx.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'nginx' in services_enabled"
  tags:
    - always
    - nginx
    - docker-compose

# Branding preparation and generation

- name: Detect if branding_source is a git URL
  set_fact:
    branding_is_git_url: "{{ branding_source is defined and branding_source is match('^(https?://|git@).*') }}"
    branding_build_source: "{{ 'git' if (branding_source is defined and branding_source is match('^(https?://|git@).*')) else 'local' }}"
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Set branding source path for local builds
  set_fact:
    branding_source_path: >-
      {%- if branding_is_git_url | default(false) -%}
        /tmp/branding-git-checkout
      {%- elif branding_source is match('^/') -%}
        {{ branding_source }}
      {%- else -%}
        {{ inventory_dir }}/{{ branding_source }}
      {%- endif -%}
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Debug branding source path
  debug:
    msg: "Branding source path: [{{ branding_source_path }}]"
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Ensure branding build directory exists
  file:
    path: "{{ docker_compose_data_dir }}/dockerfiles/branding"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Clone branding from git repository (if git URL)
  git:
    repo: "{{ branding_source }}"
    dest: "{{ branding_source_path }}"
    version: "{{ branding_git_ref | default('master') }}"
    update: yes
    force: yes
    recursive: yes
  become: false
  when: "'branding' in services_to_build and branding_is_git_url | bool"
  tags:
    - branding

- name: Copy branding source to build directory
  synchronize:
    src: "{{ branding_source_path }}/"
    dest: "{{ docker_compose_data_dir }}/dockerfiles/branding/"
    delete: no
    recursive: yes
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.git"
      - "--exclude=public"
      - "--exclude=dist"
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Copy branding Dockerfile to build directory
  copy:
    src: "docker/branding/Dockerfile"
    dest: "{{ docker_compose_data_dir }}/dockerfiles/branding/Dockerfile"
    mode: '0644'
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Copy branding nginx.conf
  copy:
    src: "docker/branding/nginx.conf"
    dest: "{{ docker_compose_data_dir }}/dockerfiles/branding/nginx.conf"
    mode: '0644'
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Generate branding.yml
  template:
    src: docker-compose/infrastructure/branding.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/branding.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'branding' in group_names or 'branding' in physical_server_groups"
  tags:
    - branding
    - docker-compose

- name: Add branding hostname to nginx_docker_internal_aliases
  set_fact:
    nginx_docker_internal_aliases: "{{ nginx_docker_internal_aliases | default([]) | union([branding_url]) | unique }}"
  when: "'branding' in group_names and branding_url is defined"
  tags:
    - branding

- name: Add mailhog hostname to nginx_docker_internal_aliases
  set_fact:
    nginx_docker_internal_aliases: "{{ nginx_docker_internal_aliases | default([]) | union([docker_mail_development_url]) | unique }}"
  when: docker_mail_development_mode | default(false) | bool and docker_mail_development_url is defined
  tags:
    - mail

- name: Set mail configuration variables when docker_mail_development_mode is enabled
  set_fact:
    docker_mail_development_url: "{{ docker_mail_development_url | default('mailhog.l-a.site') }}"
    mail_smtp_host: mailhog
    mail_smtp_port: 1025
    mail_http_port: 8025
    mail_host: mailhog
  when: docker_mail_development_mode | default(false) | bool
  tags:
    - mail

- name: Set mail configuration variables when docker_mail_development_mode is disabled
  set_fact:
    mail_smtp_host: postfix
    mail_smtp_port: 25
    mail_host: postfix
  when: not (docker_mail_development_mode | default(false) | bool)
  tags:
    - mail

- name: Configure mailhog nginx vhost (Docker development mode)
  block:
    - name: Create mailhog nginx vhost using nginx_vhost role
      include_role:
        name: nginx_vhost
      vars:
        appname: "mailhog"
        hostname: "{{ docker_mail_development_url }}"
        context_path: "/"
        nginx_root: "/srv/{{ docker_mail_development_url }}/www/"
        use_gatus: true
        nginx_vhost_fast_mode: true
        nginx_paths:
          - path: "/"
            sort_label: "1"
            is_proxy: true
            is_proxy_rewrite: false
            proxy_pass: "http://{{ mail_host | default('mailhog') }}:{{ mail_http_port | default('8025') }}/"
  when:
    - docker_mail_development_mode | default(false) | bool
    - docker_mail_development_url is defined
  tags:
    - mail
    - nginx_vhost
    - config
    - config-docker

