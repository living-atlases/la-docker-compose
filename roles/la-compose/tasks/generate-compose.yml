- name: Generate mysql.yml
  template:
    src: docker-compose/infrastructure/mysql.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/mysql.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: enable_mysql | bool
