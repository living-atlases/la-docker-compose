# nginx.yml is generated later (search "Generate nginx.yml (after collecting aliases)")
# so that nginx_docker_internal_aliases includes hostnames from all nginx_vhost
# include_role calls — including branding, mailhog, and gatus — letting the
# nginx container resolve every public FQDN to itself via Docker's DNS.

# Branding preparation and generation

- name: Detect if branding_source is a git URL
  set_fact:
    branding_is_git_url: "{{ branding_source is defined and branding_source is match('^(https?://|git@).*') }}"
    branding_build_source: "{{ 'git' if (branding_source is defined and branding_source is match('^(https?://|git@).*')) else 'local' }}"
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Set branding source path for local builds
  set_fact:
    branding_source_path: >-
      {%- if branding_is_git_url | default(false) -%}
        /tmp/branding-git-checkout
      {%- elif branding_source is match('^/') -%}
        {{ branding_source }}
      {%- else -%}
        {{ inventory_dir }}/{{ branding_source }}
      {%- endif -%}
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Debug branding source path
  debug:
    msg: "Branding source path: [{{ branding_source_path }}]"
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Ensure branding build directory exists
  file:
    path: "{{ docker_compose_data_dir }}/dockerfiles/branding"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  become: true
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Clone branding from git repository (if git URL)
  git:
    repo: "{{ branding_source }}"
    dest: "{{ branding_source_path }}"
    version: "{{ branding_git_ref | default('master') }}"
    update: yes
    force: yes
    recursive: yes
  become: false
  when: "'branding' in services_to_build and branding_is_git_url | bool"
  tags:
    - branding

# Local (non-git-URL) branding sources are checked out by the user and may carry
# git submodules (e.g. commonui-bs3-2019, which ships jquery/bootstrap/font-awesome
# under build/{js,css,fonts}). The Vite build COPYs those into the assets volume,
# and the Docker build context excludes .git, so submodules must be materialised on
# the host before the synchronize below. The git-URL path already does this via
# recursive: yes. Mirrors deploy.sh's required "git submodule update --init" step.
- name: Stat branding .gitmodules (local source)
  stat:
    path: "{{ branding_source_path }}/.gitmodules"
  register: branding_gitmodules
  when: "'branding' in services_to_build and not (branding_is_git_url | default(false) | bool)"
  tags:
    - branding

- name: Initialize branding git submodules (local source)
  command:
    cmd: git submodule update --init --recursive
    chdir: "{{ branding_source_path }}"
  register: branding_submodule_init
  changed_when: "branding_submodule_init.stdout | trim | length > 0"
  when: >-
    'branding' in services_to_build
    and not (branding_is_git_url | default(false) | bool)
    and branding_gitmodules.stat.exists | default(false)
  tags:
    - branding

- name: Copy branding source to build directory
  synchronize:
    src: "{{ branding_source_path }}/"
    dest: "{{ docker_compose_data_dir }}/dockerfiles/branding/"
    delete: yes
    recursive: yes
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.git"
      - "--exclude=public"
      - "--exclude=dist"
  when: "'branding' in services_to_build"
  tags:
    - branding

# Derive branding_version from a content hash of the synced source so the image
# tag changes only when the branding actually changes. This gives docker compose
# a deterministic signal to recreate the run-once branding-init container (which
# repopulates the la_branding-assets volume); identical source => identical tag
# => bake and recreate are no-ops (idempotent).
- name: Compute branding source content hash
  shell: >-
    set -o pipefail;
    find "{{ docker_compose_data_dir }}/dockerfiles/branding/" -type f
    -not -path '*/node_modules/*' -not -path '*/.git/*'
    -not -path '*/public/*' -not -path '*/dist/*'
    -print0 | sort -z | xargs -0 sha1sum | sha1sum | cut -c1-12
  args:
    executable: /bin/bash
  register: branding_src_hash
  changed_when: false
  when: "'branding' in services_to_build"
  tags:
    - branding
    - docker-compose

- name: Set branding_version from source hash
  set_fact:
    branding_version: "{{ branding_src_hash.stdout | trim }}"
  when: "'branding' in services_to_build"
  tags:
    - branding
    - docker-compose

- name: Copy branding Dockerfile to build directory
  copy:
    src: "docker/branding/Dockerfile"
    dest: "{{ docker_compose_data_dir }}/dockerfiles/branding/Dockerfile"
    mode: '0644'
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Copy branding nginx.conf
  copy:
    src: "docker/branding/nginx.conf"
    dest: "{{ docker_compose_data_dir }}/dockerfiles/branding/nginx.conf"
    mode: '0644'
  when: "'branding' in services_to_build"
  tags:
    - branding

- name: Generate branding.yml
  template:
    src: docker-compose/infrastructure/branding.yml.j2
    dest: "{{ docker_compose_data_dir }}/infrastructure/branding.yml"
    mode: '0644'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  when: "'branding' in group_names or 'branding' in physical_server_groups"
  tags:
    - branding
    - docker-compose

- name: Register branding nginx vhost for gatus monitoring
  include_role:
    name: nginx_vhost
  vars:
    appname: "branding"
    hostname: "{{ branding_url }}"
    context_path: "/"
    use_gatus: true
    vhost_required: true
    nginx_vhost_fast_mode: true
    nginx_cors_origin_regexp: "{{ branding_nginx_cors_origin_regexp | default(omit) }}"
    # Serve the same docroot at both / and the versioned path (e.g. /brand-2023/)
    # so apps requesting header_and_footer_baseurl = host/brand-2023 get the real
    # assets instead of a 404 HTML page (which Chrome blocks via ORB).
    nginx_paths: "{{ [{'path': '/', 'sort_label': '1', 'is_proxy': false, 'alias': '/srv/' + branding_url + '/www/'}] + ([{'path': branding_path | regex_replace('/$', '') + '/', 'sort_label': '2', 'is_proxy': false, 'alias': '/srv/' + branding_url + '/www/'}] if (branding_path is defined and branding_path != '/') else []) }}"
  when:
    - "'branding' in group_names or 'branding' in physical_server_groups"
    - branding_url is defined
  tags:
    - branding
    - docker-compose

- name: Register branding-as-home nginx vhost (root domain) for gatus monitoring
  include_role:
    name: nginx_vhost
  vars:
    appname: "branding-home"
    hostname: "{{ branding_home_url }}"
    context_path: "/"
    use_gatus: true
    vhost_required: true
    nginx_vhost_fast_mode: true
    nginx_cors_origin_regexp: "{{ branding_nginx_cors_origin_regexp | default(omit) }}"
    nginx_paths: "{{ [{'path': '/', 'sort_label': '1', 'is_proxy': false, 'alias': '/srv/' + branding_url + '/www/'}] + ([{'path': branding_path | regex_replace('/$', '') + '/', 'sort_label': '2', 'is_proxy': false, 'alias': '/srv/' + branding_url + '/www/'}] if (branding_path is defined and branding_path != '/') else []) }}"
  when:
    - "'branding' in group_names or 'branding' in physical_server_groups"
    - branding_url is defined
    - branding_as_home | default(true) | bool
    - branding_home_url is defined
  tags:
    - branding
    - docker-compose

- name: Add branding hostname to nginx_docker_internal_aliases
  set_fact:
    nginx_docker_internal_aliases: "{{ nginx_docker_internal_aliases | default([]) | union([branding_url]) | union(([branding_home_url] if (branding_as_home | default(true) | bool and branding_home_url is defined) else [])) | unique }}"
  when: "'branding' in group_names and branding_url is defined"
  tags:
    - branding

- name: Add mailhog hostname to nginx_docker_internal_aliases
  set_fact:
    nginx_docker_internal_aliases: "{{ nginx_docker_internal_aliases | default([]) | union([docker_mail_development_url]) | unique }}"
  when: docker_mail_development_mode | default(false) | bool and docker_mail_development_url is defined
  tags:
    - mail

# Single source of truth for mail host/port resolution. Fixes both naming
# conventions at once: mail_host/mail_port (grails-mail: userdetails, merit,
# ecodata, biocollect, webapi, logger) and mail_smtp_host/mail_smtp_port
# (biocache mail.smtp.*). Runs after all normalize-hostnames includes, so it is
# the final word and nothing downstream clobbers it.
- name: Set mail configuration variables (development mode → mailhog)
  set_fact:
    docker_mail_development_url: "{{ docker_mail_development_url | default('mailhog.l-a.site') }}"
    mail_smtp_host: mailhog
    mail_smtp_port: 1025
    mail_http_port: 8025
    mail_host: mailhog
    mail_port: 1025
  when: docker_mail_development_mode | default(false) | bool
  tags:
    - mail

# Production with an external SMTP server declared in the inventory: keep the
# inventory host/port instead of forcing postfix.
- name: Set mail configuration variables (production, external SMTP from inventory)
  set_fact:
    mail_host: "{{ mail_host if (mail_host | default('localhost') not in ['localhost', '127.0.0.1']) else mail_smtp_host }}"
    mail_smtp_host: "{{ mail_smtp_host if (mail_smtp_host | default('localhost') not in ['localhost', '127.0.0.1']) else mail_host }}"
    mail_port: "{{ mail_port | default(mail_smtp_port) | default(25) }}"
    mail_smtp_port: "{{ mail_smtp_port | default(mail_port) | default(25) }}"
  when:
    - not (docker_mail_development_mode | default(false) | bool)
    - (mail_host | default('localhost')) not in ['localhost', '127.0.0.1']
      or (mail_smtp_host | default('localhost')) not in ['localhost', '127.0.0.1']
  tags:
    - mail

# Production with no external SMTP server: relay through the postfix container.
- name: Set mail configuration variables (production, default postfix relay)
  set_fact:
    mail_smtp_host: postfix
    mail_smtp_port: 25
    mail_host: postfix
    mail_port: 25
  when:
    - not (docker_mail_development_mode | default(false) | bool)
    - (mail_host | default('localhost')) in ['localhost', '127.0.0.1']
    - (mail_smtp_host | default('localhost')) in ['localhost', '127.0.0.1']
  tags:
    - mail

- name: Configure mailhog nginx vhost (Docker development mode)
  block:
    - name: Create mailhog nginx vhost using nginx_vhost role
      include_role:
        name: nginx_vhost
      vars:
        appname: "mailhog"
        hostname: "{{ docker_mail_development_url }}"
        context_path: "/"
        nginx_root: "/srv/{{ docker_mail_development_url }}/www/"
        use_gatus: true
        nginx_vhost_fast_mode: true
        nginx_paths:
          - path: "/"
            sort_label: "1"
            is_proxy: true
            is_proxy_rewrite: false
            proxy_pass: "http://{{ mail_host | default('mailhog') }}:{{ mail_http_port | default('8025') }}/"
  when:
    - docker_mail_development_mode | default(false) | bool
    - docker_mail_development_url is defined
  tags:
    - mail
    - docker-compose
    - nginx_vhost
    - config
    - config-docker

- name: Generate mongodb.yml
  template:
