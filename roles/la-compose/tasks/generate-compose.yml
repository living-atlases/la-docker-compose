    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  loop:
    - "{{ docker_compose_data_dir }}/db-backups"
    - "{{ docker_compose_data_dir }}/mysql/init"
    - "{{ docker_compose_data_dir }}/mongodb/init"
    - "{{ docker_compose_data_dir }}/var-log-atlas/cas"
    - "{{ docker_compose_data_dir }}/var-log-atlas/cas-management"
    - "{{ docker_compose_data_dir }}/var-log-atlas/apikey"
    - "{{ docker_compose_data_dir }}/var-log-atlas/userdetails"
    - "{{ docker_compose_data_dir }}/var-log-atlas/image-service"
  tags:
    - docker-compose

# Per-service log dirs that get bind-mounted onto /var/log/tomcat9 in the
# container (collectory/species-list/bie-index/bie-hub logback hardcodes that
# path via a <variable> tag, overriding env vars). Without these dirs docker
# creates them as root and the JVM can't write — services restart with
# "Failed to create parent directories for /var/log/tomcat9/<svc>.log".
- name: Ensure /var/log/tomcat9 bind-source dirs exist for tomcat-based services
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ docker_compose_userid }}"
    group: "{{ docker_compose_usergid }}"
  loop:
    - "{{ data_dir }}/collectory/logs"
    - "{{ data_dir }}/specieslist-webapp/logs"
    - "{{ data_dir }}/bie-index/logs"
    - "{{ data_dir }}/ala-bie-hub/logs"
  tags:
    - docker-compose

# Inventory (autogenerated by yo living-atlas) carries an OS-conditional Jinja
# expression for zookeeper_version. Ansible re-templates inventory values at
# lookup time, so a `when: '{' in ...` guard never catches it. Override here;
# --extra="zookeeper_version=X.Y.Z" still wins via Ansible precedence.
- name: Force zookeeper version
  set_fact:
    zookeeper_version: "3.9.3"
  tags:
    - docker-compose

# Build JAVA_OPTS for each service from inventory variables
- name: Initialize temp_java_opts variable
  set_fact:
    temp_java_opts: {}
  tags:
    - docker-compose

- name: Build JAVA_OPTS strings for each service
  set_fact:
    temp_java_opts: "{{ temp_java_opts | default({}) | combine({
      item: '-Djava.awt.headless=true -Xmx' +
            (vars.get(item.replace('-', '_') + '_max_memory', '2g')) +
            ' -Xms' +
            (vars.get(item.replace('-', '_') + '_min_memory', '1g')) +
            ' ' +
            (vars.get('java_security_opts', '-Dlog4j2.formatMsgNoLookups=true'))
    }) }}"
  # Loop over ALL Java services (those with log_config_filename) so .env always contains
  # *_JAVA_OPTS for every known service. Inventory overrides (e.g. biocache_service_max_memory)
  # are picked up regardless of whether the service is currently in services_enabled.
  loop: "{{ docker_services_desc | dict2items
            | selectattr('value.log_config_filename', 'defined')
            | map(attribute='key') | list }}"
  tags:
    - docker-compose

# Build service_extra_params dict for templates
- name: Initialize service_extra_params variable
  set_fact:
    service_extra_params: {}
  tags:
    - docker-compose

- name: Build extra_params dict for services
  set_fact:
    service_extra_params: "{{ service_extra_params | default({}) | combine({
      item: docker_services_desc.get(item, {}).get('extra_params', [])
    }) }}"
  loop: "{{ docker_services_desc | dict2items
            | selectattr('value.log_config_filename', 'defined')
            | map(attribute='key') | list }}"
  tags:
    - docker-compose

