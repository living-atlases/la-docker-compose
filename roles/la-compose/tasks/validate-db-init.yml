---
# Validate that databases and tables were created correctly
# Uses docker exec to connect inside the running containers - no host port exposure needed.
# 1. MySQL databases (emmet, apikey) and tables
# 2. MongoDB collections
# 3. OIDC services in MongoDB

- name: "Database validation: Validate MySQL emmet database tables"
  command: >
    docker exec la_mysql mysql
    -u root -p{{ mysql_root_password }}
    -e "SHOW TABLES FROM {{ cas_db_name | default('emmet') }};"
  register: emmet_tables
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init
    - db-validation

- name: "Database validation: Verify emmet database has tables"
  assert:
    that:
      - emmet_tables is not failed
      - emmet_tables.stdout_lines | length > 1
    fail_msg: |
      FAILED: Emmet database validation failed!
      Error: {{ emmet_tables.stderr | default('No tables found') }}
    success_msg: "OK - Emmet database has {{ (emmet_tables.stdout_lines | length) - 1 }} tables"
  tags:
    - db-init
    - db-validation

- name: "Database validation: Validate MySQL apikey database tables"
  command: >
    docker exec la_mysql mysql
    -u root -p{{ mysql_root_password }}
    -e "SHOW TABLES FROM {{ apikey_db_name | default('apikey') }};"
  register: apikey_tables
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init
    - db-validation

- name: "Database validation: Verify apikey database has tables"
  assert:
    that:
      - apikey_tables is not failed
      - apikey_tables.stdout_lines | length > 1
    fail_msg: |
      FAILED: Apikey database validation failed!
      Error: {{ apikey_tables.stderr | default('No tables found') }}
    success_msg: "OK - Apikey database has {{ (apikey_tables.stdout_lines | length) - 1 }} tables"
  tags:
    - db-init
    - db-validation

- name: "Database validation: Validate MongoDB cas-ticket-registry collections"
  command: >
    docker exec la_mongodb mongosh --quiet
    --username {{ cas_tickets_username | default('cas') }}
    --password {{ cas_tickets_password }}
    --eval "db.getMongo().getDBNames().join('\n')"
    {{ cas_tickets_db | default('cas-ticket-registry') }}
  register: ticket_registry_info
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init
    - db-validation

- name: "Database validation: Display MongoDB cas-ticket-registry status"
  debug:
    msg: |
      {% if ticket_registry_info is not failed %}
      MongoDB CAS Ticket Registry initialized
      Output: {{ ticket_registry_info.stdout | default('') }}
      {% else %}
      MongoDB CAS Ticket Registry validation skipped
      Reason: {{ ticket_registry_info.stderr | default('Connection failed') }}
      Note: MongoDB may still be initializing, this is not critical
      {% endif %}
  tags:
    - db-init
    - db-validation

- name: "Database validation: Validate MongoDB cas-service-registry collections"
  command: >
    docker exec la_mongodb mongosh --quiet
    --username {{ cas_services_username | default('cas') }}
    --password {{ cas_services_password }}
    --eval "db.getCollectionNames().join('\n')"
    {{ cas_services_db | default('cas-service-registry') }}
  register: service_registry_info
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init
    - db-validation

- name: "Database validation: Display MongoDB cas-service-registry status"
  debug:
    msg: |
      {% if service_registry_info is not failed %}
      MongoDB CAS Service Registry initialized
      Collections: {{ service_registry_info.stdout | default('') }}
      {% else %}
      MongoDB CAS Service Registry validation skipped
      Reason: {{ service_registry_info.stderr | default('Connection failed') }}
      Note: MongoDB may still be initializing, this is not critical
      {% endif %}
  tags:
    - db-init
    - db-validation

- name: "Database validation: Check OIDC services count (MongoDB)"
  command: >
    docker exec la_mongodb mongosh --quiet
    --username {{ cas_services_username | default('cas') }}
    --password {{ cas_services_password }}
    --eval "db.OAuthRegisteredService.countDocuments()"
    {{ cas_services_db | default('cas-service-registry') }}
  register: oidc_services
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init
    - db-validation

- name: "Database validation: Display OIDC services status"
  debug:
    msg: |
      {% if oidc_services is not failed %}
      OIDC Services registered: {{ oidc_services.stdout | default('0') }}
      {% else %}
      OIDC services check skipped
      Reason: {{ oidc_services.stderr | default('Query failed') }}
      Note: This is normal during initial setup
      {% endif %}
  tags:
    - db-init
    - db-validation

- name: "Database validation: Validate MongoDB cas-audit-repository collections"
  command: >
    docker exec la_mongodb mongosh --quiet
    --username {{ mongodb_root_username }}
    --password {{ mongodb_root_password }}
    --authenticationDatabase admin
    --eval "db.getCollectionNames().join('\n')"
    {{ cas_audit_db | default('cas-audit-repository') }}
  register: audit_repository_info
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init
    - db-validation

- name: "Database validation: Display MongoDB cas-audit-repository status"
  debug:
    msg: |
      {% if audit_repository_info is not failed %}
      MongoDB CAS Audit Repository initialized
      Collections: {{ audit_repository_info.stdout | default('') }}
      {% else %}
      MongoDB CAS Audit Repository validation skipped
      Reason: {{ audit_repository_info.stderr | default('Connection failed') }}
      Note: MongoDB may still be initializing, this is not critical
      {% endif %}
  tags:
    - db-init
    - db-validation

- name: "Database validation: Validate MongoDB spring-sessions collections"
  command: >
    docker exec la_mongodb mongosh --quiet
    --username {{ mongodb_root_username }}
    --password {{ mongodb_root_password }}
    --authenticationDatabase admin
    --eval "db.getCollectionNames().join('\n')"
    {{ cas_spring_session_db | default('spring-sessions') }}
  register: spring_session_info
  become: true
  ignore_errors: true
  changed_when: false
  tags:
    - db-init
    - db-validation

- name: "Database validation: Display MongoDB spring-sessions status"
  debug:
    msg: |
      {% if spring_session_info is not failed %}
      MongoDB Spring Sessions initialized
      Collections: {{ spring_session_info.stdout | default('') }}
      {% else %}
      MongoDB Spring Sessions validation skipped
      Reason: {{ spring_session_info.stderr | default('Connection failed') }}
      Note: MongoDB may still be initializing, this is not critical
      {% endif %}
  tags:
    - db-init
    - db-validation

- name: "Database validation: Final summary"
  debug:
    msg: |
      Database Validation Complete!

      Summary:
      MySQL Emmet database:    {{ 'OK (' + ((emmet_tables.stdout_lines | length) - 1 | string) + ' tables)' if emmet_tables is not failed else 'FAILED' }}
      MySQL Apikey database:   {{ 'OK (' + ((apikey_tables.stdout_lines | length) - 1 | string) + ' tables)' if apikey_tables is not failed else 'FAILED' }}
      MongoDB Ticket Registry: {{ 'OK' if ticket_registry_info is not failed else 'SKIPPED' }}
      MongoDB Service Registry:{{ 'OK' if service_registry_info is not failed else 'SKIPPED' }}
      OIDC Services:           {{ oidc_services.stdout | default('0') + ' registered' if oidc_services is not failed else 'SKIPPED' }}
      MongoDB Audit Repository:{{ 'OK' if audit_repository_info is not failed else 'SKIPPED' }}
      MongoDB Spring Sessions: {{ 'OK' if spring_session_info is not failed else 'SKIPPED' }}

      All database initialization validations passed!
  tags:
    - db-init
    - db-validation
