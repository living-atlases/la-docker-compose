---
# Seed a low-privilege demo/demo user into CAS (emmet) for the Cypress login smoke test.
# Opt-in and demo-only: runs solely when e2e_demo_user_enabled is true AND CAS is co-located
# here. Never enable on production — it creates a well-known demo/demo credential.
# Same pure docker-exec/MySQL pattern as init-cas-admin.yml; the SQL is idempotent.

- name: "e2e demo user: Seed demo login account (gated)"
  when:
    - e2e_demo_user_enabled | default(false) | bool
    - "'cas-servers' in hostvars[inventory_hostname].service_aliases"
  block:
    - name: "e2e demo user: Ensure cas-setup output directory exists"
      file:
        path: "{{ docker_compose_data_dir }}/cas-setup"
        state: directory
        mode: "0755"
        owner: "{{ docker_compose_userid | default(omit) }}"
        group: "{{ docker_compose_usergid | default(omit) }}"
      become: true

    - name: "e2e demo user: Render e2e-demo-user.sql"
      template:
        src: cas-setup/e2e-demo-user.sql.j2
        dest: "{{ docker_compose_data_dir }}/cas-setup/e2e-demo-user.sql"
        mode: "0600"
      become: true

    - name: "e2e demo user: Apply via docker exec mysql"
      shell: >
        docker exec -i la_mysql mysql
        -u root -p{{ mysql_root_password }}
        {{ cas_db_name | default('emmet') }}
        < {{ docker_compose_data_dir }}/cas-setup/e2e-demo-user.sql
      become: true
      changed_when: false
      no_log: true

    - name: "e2e demo user: Report"
      debug:
        msg: "Seeded e2e demo user '{{ e2e_demo_user_email | default('demo@l-a.site') }}' (non-admin) for the login smoke test."

  tags:
    - cas-admin
    - e2e-user
